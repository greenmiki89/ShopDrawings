 fileName, blob) {\n    const form = new FormData();\n    form.append(\"attributes\", JSON.stringify({ name: safeName(fileName), parent:{ id: folderId } }));\n    form.append(\"file\", blob, safeName(fileName));\n    return this.req(\"POST\", \"https://upload.box.com/api/2.0/files/content\", form, true);\n  }\n  getFolderLink(folderId) { return `https://app.box.com/folder/${folderId}`; }\n\n  static async refreshToken(clientId, clientSecret, refreshToken) {\n    const res = await fetch(\"https://api.box.com/oauth2/token\", {\n      method:\"POST\", headers:{\"Content-Type\":\"application/x-www-form-urlencoded\"},\n      body: new URLSearchParams({ grant_type:\"refresh_token\", refresh_token:refreshToken, client_id:clientId, client_secret:clientSecret })\n    });\n    if(!res.ok) throw new Error(\"BOX_UNAUTHORIZED\");\n    return res.json();\n  }\n\n  static stripFiles(data) {\n    return JSON.parse(JSON.stringify(data, (k,v) => {\n      if (typeof File !== 'undefined' && v instanceof File) return undefined;\n      if (typeof Blob !== 'undefined' && v instanceof Blob) return undefined;\n      return v;\n    }));\n  }\n}\n\n// \u2500\u2500\u2500 JSONBIN API \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nclass JSONBin {\n  constructor(apiKey, binId) { this.apiKey=apiKey; this.binId=binId; }\n  headers() { return { \"Content-Type\":\"application/json\", \"X-Master-Key\":this.apiKey, \"X-Bin-Versioning\":\"false\" }; }\n  async load() {\n    const res = await fetch(\"https://api.jsonbin.io/v3/b/\"+this.binId+\"/latest\", { headers:this.headers() });\n    if(res.status===401||res.status===403) throw new Error(\"JSONBIN_UNAUTHORIZED\");\n    if(!res.ok) throw new Error(\"JSONBin load error \"+res.status);\n    return (await res.json()).record;\n  }\n  async save(data) {\n    const res = await fetch(\"https://api.jsonbin.io/v3/b/\"+this.binId, {\n      method:\"PUT\", headers:this.headers(), body:JSON.stringify(data)\n    });\n    if(!res.ok) { const t=await res.text(); throw new Error(\"JSONBin save error \"+res.status+\": \"+t); }\n    return res.json();\n  }\n  static async create(apiKey) {\n    const res = await fetch(\"https://api.jsonbin.io/v3/b\", {\n      method:\"POST\",\n      headers:{ \"Content-Type\":\"application/json\", \"X-Master-Key\":apiKey, \"X-Bin-Name\":\"submittal-manager\", \"X-Bin-Private\":\"false\" },\n      body: JSON.stringify({ projects:[], boxCreds:null, savedAt: new Date().toISOString() })\n    });\n    if(!res.ok) { const t=await res.text(); throw new Error(\"JSONBin create error \"+res.status+\": \"+t); }\n    return (await res.json()).metadata.id;\n  }\n}\n\n// \u2500\u2500\u2500 PDF GENERATION (shared utility) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction injectPdfGen(html) {\n  const s = `\n<scr`+`ipt src=\"https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js\"></scr`+`ipt>\n<scr`+`ipt src=\"https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js\"></scr`+`ipt>\n<scr`+`ipt>\nwindow.addEventListener(\"load\",async function(){\n  try{\n    var nb=document.querySelector(\".no-print\");if(nb)nb.style.display=\"none\";\n    await new Promise(r=>setTimeout(r,600));\n    var canvas=await html2canvas(document.body,{scale:2,useCORS:true,backgroundColor:\"#ffffff\",width:780,windowWidth:780});\n    var imgData=canvas.toDataURL(\"image/jpeg\",0.92);\n    var {jsPDF}=window.jspdf;\n    var pdf=new jsPDF({orientation:\"portrait\",unit:\"pt\",format:\"letter\"});\n    var pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();\n    var ih=pw*(canvas.height/canvas.width),y=0;\n    while(y<ih){if(y>0)pdf.addPage();pdf.addImage(imgData,\"JPEG\",0,-y,pw,ih);y+=ph;}\n    window.parent.postMessage({type:\"COVER_PDF_READY\",pdf:pdf.output(\"datauristring\").split(\",\")[1]},\"*\");\n  }catch(e){window.parent.postMessage({type:\"COVER_PDF_ERROR\",error:e.message},\"*\");}\n});\n</scr`+`ipt>`;\n  return html.replace(\"</body>\", s+\"</body>\");\n}\n\nfunction generateCoverPdf(html) {\n  return new Promise((resolve,reject) => {\n    const enhanced = injectPdfGen(html);\n    const blob = new Blob([enhanced],{type:\"text/html\"});\n    const url  = URL.createObjectURL(blob);\n    const iframe = document.createElement(\"iframe\");\n    iframe.style.cssText = \"position:fixed;top:-9999px;left:-9999px;width:900px;height:1400px;opacity:0;pointer-events:none;\";\n    document.body.appendChild(iframe);\n    const timer = setTimeout(() => {\n      document.body.removeChild(iframe); URL.revokeObjectURL(url);\n      reject(new Error(\"PDF generation timed out.\"));\n    }, 40000);\n    const handler = e => {\n      if (!e.data || (e.data.type!==\"COVER_PDF_READY\" && e.data.type!==\"COVER_PDF_ERROR\")) return;\n      clearTimeout(timer); window.removeEventListener(\"message\",handler);\n      document.body.removeChild(iframe); URL.revokeObjectURL(url);\n      if (e.data.type===\"COVER_PDF_READY\") {\n        const bin=atob(e.data.pdf), bytes=new Uint8Array(bin.length);\n        for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);\n        resolve(bytes);\n      } else reject(new Error(e.data.error));\n    };\n    window.addEventListener(\"message\",handler);\n    iframe.src = url;\n  });\n}\n\nfunction openBlob(html) {\n  try {\n    const a=document.createElement(\"a\"); a.href=URL.createObjectURL(new Blob([html],{type:\"text/html\"}));\n    a.target=\"_blank\"; document.body.appendChild(a); a.click(); document.body.removeChild(a);\n  } catch(_) {\n    const a=document.createElement(\"a\"); a.href=\"data:text/html;charset=utf-8,\"+encodeURIComponent(html);\n    a.target=\"_blank\"; a.download=\"document.html\"; document.body.appendChild(a); a.click(); document.body.removeChild(a);\n  }\n}\n\n// \u2500\u2500\u2500 COVER LETTER HTML \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction coverSheetHTML(sub, project, logoDataUrl) {\n  const rev  = sub.revisions[sub.revisions.length-1]||{};\n  const dateStr = fmtDate(rev.dateSubmitted||sub.dateCreated);\n  const sender  = sub.revisions[0]?.submittedBy||project.contractorContact||\"\";\n  const recip   = project.clientContact||project.client;\n  const firstName = recip.split(\" \")[0];\n  const noteLines = (sub.notes||\"\").split(/\\r?\\n/).map(l=>l.trim()).filter(Boolean);\n  const body = noteLines.length>1\n    ? `<p style=\"margin-bottom:10px\">Please find attached shop drawing for <strong>${sub.title}</strong> for the following:</p><ul style=\"margin:0 0 16px 24px;line-height:2\">${noteLines.map(l=>`<li>${l}</li>`).join(\"\")}</ul>`\n    : `<p style=\"margin-bottom:16px;line-height:1.85\">Please find attached shop drawing for <strong>${sub.title}</strong>${sub.notes?\". \"+sub.notes:\".\"}</p>`;\n  return `<!DOCTYPE html><html><head><title>${sub.number} \u2013 Submittal Transmittal</title><style>\n*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#111;max-width:780px;margin:0 auto}\n.no-print{background:#F3F4F6;border-bottom:1px solid #D1D5DB;padding:9px 28px;display:flex;gap:10px;align-items:center;font-family:monospace;font-size:11px}\n@media print{.no-print{display:none!important}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;max-width:100%}}\n.lh{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 32px 14px;border-bottom:3px solid #1a1a2e}\n.co-name{font-size:20px;font-weight:700;color:#1a1a2e}.co-tag{font-size:10px;color:#6B7280;margin-top:3px;line-height:1.7}\n.band{background:#1a1a2e;color:#fff;padding:8px 32px;display:flex;justify-content:space-between;align-items:center}\n.band-t{font-size:11px;letter-spacing:.12em;font-weight:600;text-transform:uppercase}\n.band-n{font-family:monospace;font-size:14px;font-weight:700;color:#F59E0B}\n.meta{padding:16px 32px 0}.meta table{width:100%;border-collapse:collapse}.meta td{padding:5px 0;font-size:13px;vertical-align:top}\n.k{width:90px;font-weight:700;color:#374151;padding-right:8px;white-space:nowrap}.col{width:10px;color:#374151}\n.div{height:1px;background:#E5E7EB;margin:12px 0 0}.bdy{padding:20px 32px}\n.close{margin-top:20px;line-height:1.9}.sn{font-weight:700;margin-top:4px}\n.fn{margin:0 32px 20px;padding:10px 14px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:3px;font-size:11px;color:#92400E}\n.rw{margin:0 32px 28px;border:1px solid #E5E7EB;border-radius:3px;overflow:hidden}\n.rt{background:#F9FAFB;padding:7px 14px;font-size:9px;font-weight:700;color:#6B7280;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid #E5E7EB}\n.rw table{width:100%;border-collapse:collapse;font-size:11px}\n.rw th{text-align:left;padding:6px 10px;background:#F9FAFB;border-bottom:1px solid #E5E7EB;font-size:9px;color:#9CA3AF;letter-spacing:.08em;text-transform:uppercase}\n.rw td{padding:7px 10px;border-bottom:1px solid #F3F4F6;color:#374151}\n</style></head><body>\n<div class=\"no-print\"><button onclick=\"window.print()\" style=\"background:#1a1a2e;color:#F59E0B;border:none;border-radius:3px;padding:7px 18px;font-family:monospace;font-size:11px;cursor:pointer;letter-spacing:.08em\">\u2399 PRINT / SAVE AS PDF</button><span style=\"color:#9CA3AF\"> Print \u2192 Save as PDF to export</span></div>\n<div class=\"lh\"><div style=\"display:flex;align-items:center;gap:14px\">${logoDataUrl?`<img src=\"${logoDataUrl}\" style=\"max-height:52px;max-width:140px;object-fit:contain\" alt=\"logo\"/>`:\"\" }<div><div class=\"co-name\">${project.contractorName}</div><div class=\"co-tag\">${project.contractorAddress}</div></div></div>\n<div style=\"text-align:right;font-size:11px;color:#374151;line-height:1.8\">${sender?`<div><strong>${sender}</strong></div>`:\"\"}${project.contractorEmail?`<div>${project.contractorEmail}</div>`:\"\"}${project.contractorPhone?`<div>${project.contractorPhone}</div>`:\"\"}</div></div>\n<div class=\"band\"><span class=\"band-t\">Shop Drawing Submittal Transmittal</span><span class=\"band-n\">${sub.number} \u00b7 Rev ${sub.currentRev}</span></div>\n<div class=\"meta\"><table>\n<tr><td class=\"k\">To</td><td class=\"col\">:</td><td>${recip}</td><td style=\"width:110px;text-align:right;font-size:11px;color:#6B7280\">Date</td><td class=\"col\">:</td><td style=\"width:140px;font-size:12px;font-weight:700\">${dateStr}</td></tr>\n<tr><td class=\"k\">From</td><td class=\"col\">:</td><td>${sender?`<strong>${sender}</strong><br><span style=\"font-size:11px;color:#6B7280\">${project.contractorName}</span>`:project.contractorName}</td><td style=\"text-align:right;font-size:11px;color:#6B7280\">Submittal No.</td><td class=\"col\">:</td><td style=\"font-family:monospace;font-size:12px;font-weight:700\">${sub.number}</td></tr>\n<tr><td class=\"k\">Contract</td><td class=\"col\">:</td><td colspan=\"4\">${project.name}${project.number?` <span style=\"font-size:11px;color:#6B7280\">(${project.number})</span>`:\"\"}</td></tr>\n<tr><td class=\"k\">Submittal</td><td class=\"col\">:</td><td colspan=\"4\"><strong>${sub.number} \u2013 ${sub.title}</strong>${sub.specSection?`<br><span style=\"font-size:11px;color:#6B7280\">${sub.specSection}</span>`:\"\"}</td></tr>\n</table><div class=\"div\"></div></div>\n<div class=\"bdy\"><p style=\"margin-bottom:14px\">Hi ${firstName},</p>${body}${sub.requiredDate?`<p style=\"font-size:12px;color:#374151;margin-bottom:14px\">Please review and return by <strong>${fmtDate(sub.requiredDate)}</strong>.</p>`:\"\"}\n<div class=\"close\"><p>Regards,</p><p class=\"sn\">${sender||\"[Name]\"}</p><p style=\"color:#374151\">${project.contractorName}</p>${project.contractorEmail?`<p style=\"font-size:11px;color:#6B7280\">${project.contractorEmail}</p>`:\"\"}</div></div>\n<div class=\"fn\"><strong>Status:</strong> ${STATUS[sub.status]?.label||\"Pending Review\"}${sub.supplier?` \u00b7 <strong>Supplier:</strong> ${sub.supplier}`:\"\"}${sub.fileName?` \u00b7 <strong>File:</strong> ${sub.fileName}`:\"\"}</div>\n${sub.revisions.length>1?`<div class=\"rw\"><div class=\"rt\">Revision History</div><table><thead><tr><th>Rev</th><th>Date Submitted</th><th>Submitted By</th><th>Outcome</th><th>Reviewer Notes</th></tr></thead><tbody>${sub.revisions.map(r=>`<tr><td style=\"font-weight:700\">${r.rev}</td><td>${fmtDate(r.dateSubmitted)}</td><td>${r.submittedBy||\"\u2014\"}</td><td>${STATUS[r.status]?.label||r.status}</td><td style=\"color:#6B7280\">${r.reviewerNotes||\"\u2014\"}</td></tr>`).join(\"\")}</tbody></table></div>`:\"\"}\n</body></html>`;\n}\n\nfunction releaseOrderHTML(ro, sub, project) {\n  return `<!DOCTYPE html><html><head><title>Release Order \u2013 ${ro.number}</title><style>\n*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;font-size:13px;color:#111}\n.no-print{background:#F9FAFB;border-bottom:1px solid #E5E7EB;padding:10px 32px;display:flex;gap:12px;align-items:center;font-family:monospace;font-size:12px}\n@media print{.no-print{display:none!important}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}\n.hdr{background:#0A0F1E;color:#fff;padding:20px 32px;display:flex;justify-content:space-between;align-items:center}\n.hbl{font-family:monospace;font-size:10px;letter-spacing:.15em;color:#8B5CF6;margin-bottom:4px}\n.ronum{font-family:monospace;font-size:22px;color:#8B5CF6;font-weight:700}\n.bdy{padding:28px 32px}.st{font-family:monospace;font-size:9px;color:#9CA3AF;letter-spacing:.12em;margin-bottom:10px}\n.box{border:1px solid #E5E7EB;border-radius:4px;padding:16px;margin-bottom:16px}\ntable{width:100%;border-collapse:collapse}td{padding:7px 0;border-bottom:1px solid #F3F4F6;font-size:13px;vertical-align:top}\ntd.lbl{font-family:monospace;font-size:10px;color:#6B7280;width:200px}\n.to-b{background:#EEF2FF;border:1px solid #C7D2FE;border-radius:4px;padding:14px 18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}\n.po-b{background:#FFF7ED;border:2px solid #FED7AA;border-radius:4px;padding:14px 18px;margin-bottom:16px}\n.po-n{font-family:monospace;font-size:24px;font-weight:700;color:#C2410C}\n.sg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}\n.sb{border:1px solid #E5E7EB;border-radius:3px;padding:14px}\n.sl{height:52px;border-bottom:1px solid #D1D5DB;margin-bottom:8px}\n.slbl{font-family:monospace;font-size:9px;color:#9CA3AF;letter-spacing:.08em}\n</style></head><body>\n<div class=\"no-print\"><button onclick=\"window.print()\" style=\"background:#0A0F1E;color:#8B5CF6;border:none;border-radius:3px;padding:7px 18px;font-family:monospace;font-size:11px;cursor:pointer;letter-spacing:.08em\">\u2399 PRINT / SAVE AS PDF</button><span style=\"color:#9CA3AF\"> Print \u2192 Save as PDF</span></div>\n<div class=\"hdr\"><div><div class=\"hbl\">MATERIAL RELEASE ORDER</div><div style=\"font-size:20px;font-weight:700\">${project.name}</div><div style=\"font-size:12px;color:#94A3B8;margin-top:4px\">Issued by: ${project.contractorName}</div></div>\n<div style=\"text-align:right\"><div class=\"ronum\">${ro.number}</div><div style=\"font-family:monospace;font-size:10px;color:#94A3B8;margin-top:4px\">Date: ${fmtDate(ro.date)}</div></div></div>\n<div class=\"bdy\">\n<div class=\"to-b\"><div><div style=\"font-family:monospace;font-size:9px;color:#4338CA;letter-spacing:.1em;margin-bottom:3px\">ISSUED TO (SUPPLIER)</div><div style=\"font-size:17px;font-weight:700\">${ro.supplierName}</div>${ro.supplierContact?`<div style=\"font-size:12px;color:#6B7280;margin-top:2px\">${ro.supplierContact}</div>`:\"\"}</div>\n<div style=\"text-align:right\"><div style=\"font-family:monospace;font-size:9px;color:#6B7280;letter-spacing:.1em\">PROJECT NO.</div><div style=\"font-family:monospace;font-size:15px;font-weight:700;color:#4338CA;margin-top:3px\">${project.number}</div></div></div>\n<div class=\"po-b\"><div style=\"font-family:monospace;font-size:9px;color:#92400E;letter-spacing:.12em;margin-bottom:5px\">PURCHASE ORDER NUMBER</div><div class=\"po-n\">${ro.poNumber}</div>${ro.poDate?`<div style=\"font-size:11px;color:#92400E;margin-top:4px\">PO Date: ${fmtDate(ro.poDate)}</div>`:\"\"}</div>\n<div class=\"box\"><div class=\"st\">LINKED SUBMITTAL</div><table>${[[\"Submittal No.\",`<strong>${sub.number}</strong>`],[\"Description\",sub.title],[\"Spec Section\",sub.specSection],[\"Drawing / Doc No.\",sub.drawingNumber||\"\u2014\"],[\"Approved Revision\",sub.currentRev],[\"Approval Status\",STATUS[sub.status]?.label||\"\u2014\"],[\"Approval Date\",fmtDate(ro.approvalDate)]].map(([k,v])=>`<tr><td class=\"lbl\">${k}</td><td>${v}</td></tr>`).join(\"\")}</table></div>\n<div class=\"box\"><div class=\"st\">RELEASE DETAILS</div><table>${[[\"Quantity / Scope\",ro.quantity||\"Per Contract\"],[\"Required Delivery Date\",fmtDate(ro.deliveryDate)],[\"Delivery Address\",ro.deliveryAddress||project.contractorAddress]].map(([k,v])=>`<tr><td class=\"lbl\">${k}</td><td>${v}</td></tr>`).join(\"\")}</table></div>\n${ro.conditions?`<div class=\"box\" style=\"background:#F9FAFB\"><div class=\"st\">CONDITIONS / SPECIAL NOTES</div><p style=\"line-height:1.9;font-size:12px\">${ro.conditions}</p></div>`:\"\"}\n<p style=\"font-size:11px;color:#9CA3AF;font-style:italic;margin:16px 0 10px\">This Release Order authorizes the supplier to proceed with fabrication and/or delivery of the above-described materials.</p>\n<div class=\"sg\"><div class=\"sb\"><div class=\"sl\"></div><div class=\"slbl\">AUTHORIZED BY (CONTRACTOR)</div><div style=\"font-size:11px;color:#6B7280;margin-top:5px\">${project.contractorName}</div><div style=\"font-family:monospace;font-size:9px;color:#D1D5DB;margin-top:4px\">Date: ___________</div></div>\n<div class=\"sb\"><div class=\"sl\"></div><div class=\"slbl\">ACKNOWLEDGED BY (SUPPLIER)</div><div style=\"font-size:11px;color:#6B7280;margin-top:5px\">${ro.supplierName}</div><div style=\"font-family:monospace;font-size:9px;color:#D1D5DB;margin-top:4px\">Date: ___________</div></div></div>\n</div></body></html>`;\n}\n\n// \u2500\u2500\u2500 BOX UPLOAD SEQUENCE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n// Returns { folderId, folderUrl, coverUrl, drawingUrl }\nasync function runBoxUpload(box, sub, project, revLabel, setStep, logoDataUrl) {\n  if (!box || !project.boxFolderId) throw new Error(\"No Box folder linked to this project.\");\n  const folderName = `${sub.number} \u2013 ${safeName(sub.title)}`;\n\n  // 1. Get or create the submittal folder\n  setStep(\"Creating Box folder\u2026\");\n  let sdFolderId;\n  try {\n    const res = await box.createFolder(folderName, project.boxFolderId);\n    sdFolderId = res.id;\n  } catch(e) {\n    // Folder may already exist \u2014 find it\n    if (e.message.includes(\"409\") || e.message.includes(\"item_name_in_use\")) {\n      setStep(\"Folder exists, locating\u2026\");\n      const items = await box.getFolderItems(project.boxFolderId);\n      const found = items.entries?.find(f=>f.type===\"folder\"&&f.name.startsWith(sub.number));\n      if (!found) throw new Error(\"Could not find or create Box folder.\");\n      sdFolderId = found.id;\n    } else throw e;\n  }\n\n  // 2. Generate cover letter PDF\n  setStep(\"Generating cover letter PDF\u2026\");\n  const coverBytes = await generateCoverPdf(coverSheetHTML(sub, project, logoDataUrl));\n\n  // 3. Merge cover + drawing (if drawing is PDF) or upload separately\n  const isPdf = sub.file && sub.file.name.toLowerCase().endsWith(\".pdf\");\n  if (sub.file && isPdf) {\n    setStep(\"Merging cover + drawing PDF\u2026\");\n    if (!window.PDFLib) {\n      await new Promise((res,rej)=>{ const s=document.createElement(\"script\"); s.src=\"https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js\"; s.onload=res; s.onerror=rej; document.head.appendChild(s); });\n    }\n    const {PDFDocument} = window.PDFLib;\n    const merged = await PDFDocument.create();\n    // Add cover pages\n    const coverDoc = await PDFDocument.load(coverBytes);\n    const coverPages = await merged.copyPages(coverDoc, coverDoc.getPageIndices());\n    coverPages.forEach(p => merged.addPage(p));\n    // Add drawing pages\n    const drawBytes = await sub.file.arrayBuffer();\n    const drawDoc = await PDFDocument.load(drawBytes);\n    const drawPages = await merged.copyPages(drawDoc, drawDoc.getPageIndices());\n    drawPages.forEach(p => merged.addPage(p));\n    // Upload single merged file\n    setStep(\"Uploading merged PDF to Box\u2026\");\n    const mergedBytes = await merged.save();\n    const mergedBlob = new Blob([mergedBytes], {type:\"application/pdf\"});\n    const mergedName = `${sub.number}-Rev${revLabel}-Submittal.pdf`;\n    await box.uploadFile(sdFolderId, mergedName, mergedBlob);\n  } else {\n    // Upload cover alone\n    setStep(\"Uploading cover letter to Box\u2026\");\n    await box.uploadFile(sdFolderId, `${sub.number}-Rev${revLabel}-Cover.pdf`, new Blob([coverBytes],{type:\"application/pdf\"}));\n    // Upload non-PDF drawing separately\n    if (sub.file) {\n      setStep(`Uploading drawing (${sub.file.name})\u2026`);\n      const ext = sub.file.name.split(\".\").pop();\n      await box.uploadFile(sdFolderId, `${sub.number}-Rev${revLabel}-Drawing.${ext}`, sub.file);\n    }\n  }\n\n  setStep(\"\u2713 Saved to Box!\");\n  return { folderId: sdFolderId, folderUrl: box.getFolderLink(sdFolderId) };\n}\n\n// \u2500\u2500\u2500 ATOMS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst Badge = ({status}) => {\n  const s=STATUS[status]||STATUS.PENDING;\n  return <span style={{display:\"inline-flex\",alignItems:\"center\",gap:5,padding:\"3px 10px\",borderRadius:3,background:s.bg,border:`1px solid ${s.color}44`,fontSize:11,fontFamily:\"'JetBrains Mono',monospace\",color:s.color,whiteSpace:\"nowrap\"}}>\n    <span style={{width:6,height:6,borderRadius:\"50%\",background:s.color,flexShrink:0}}/>{s.label}\n  </span>;\n};\nconst Btn = ({children,onClick,variant=\"primary\",small,disabled,style:sx={}}) => {\n  const base={fontFamily:\"'JetBrains Mono',monospace\",fontSize:small?11:12,letterSpacing:\".06em\",textTransform:\"uppercase\",border:\"none\",borderRadius:3,cursor:disabled?\"not-allowed\":\"pointer\",padding:small?\"5px 12px\":\"8px 18px\",transition:\"all .15s\",opacity:disabled?.4:1,...sx};\n  const V={primary:{background:\"#F59E0B\",color:\"#0A0F1E\"},ghost:{background:\"transparent\",color:\"#64748B\",border:\"1px solid #1E293B\"},outline:{background:\"transparent\",color:\"#F59E0B\",border:\"1px solid #F59E0B44\"},purple:{background:\"#8B5CF6\",color:\"#fff\"},green:{background:\"#10B981\",color:\"#fff\"},blue:{background:\"#3B82F6\",color:\"#fff\"},danger:{background:\"#EF4444\",color:\"#fff\"}};\n  return <button style={{...base,...V[variant]}} onClick={onClick} disabled={disabled}>{children}</button>;\n};\nconst Field = ({label,value,onChange,placeholder,mono,type=\"text\",small,hint}) => (\n  <div style={{display:\"flex\",flexDirection:\"column\",gap:4}}>\n    {label&&<label style={{fontSize:10,letterSpacing:\".1em\",textTransform:\"uppercase\",color:\"#475569\",fontFamily:\"'JetBrains Mono',monospace\"}}>{label}</label>}\n    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}\n      style={{background:\"#080E1C\",border:\"1px solid #1E293B\",borderRadius:3,padding:small?\"6px 10px\":\"8px 12px\",color:\"#E2E8F0\",fontSize:small?11:13,fontFamily:mono?\"'JetBrains Mono',monospace\":\"inherit\",outline:\"none\",width:\"100%\",boxSizing:\"border-box\"}}/>\n    {hint&&<div style={{fontSize:10,color:\"#334155\"}}>{hint}</div>}\n  </div>\n);\nconst Sel = ({label,value,onChange,options}) => (\n  <div style={{display:\"flex\",flexDirection:\"column\",gap:4}}>\n    {label&&<label style={{fontSize:10,letterSpacing:\".1em\",textTransform:\"uppercase\",color:\"#475569\",fontFamily:\"'JetBrains Mono',monospace\"}}>{label}</label>}\n    <select value={value} onChange={e=>onChange(e.target.value)} style={{background:\"#080E1C\",border:\"1px solid #1E293B\",borderRadius:3,padding:\"8px 12px\",color:\"#E2E8F0\",fontSize:13,outline:\"none\",cursor:\"pointer\"}}>\n      {options.map(o=>typeof o===\"string\"?<option key={o} value={o}>{o}</option>:<option key={o.v} value={o.v}>{o.l}</option>)}\n    </select>\n  </div>\n);\nconst TA = ({label,value,onChange,placeholder,rows=3}) => (\n  <div style={{display:\"flex\",flexDirection:\"column\",gap:4}}>\n    {label&&<label style={{fontSize:10,letterSpacing:\".1em\",textTransform:\"uppercase\",color:\"#475569\",fontFamily:\"'JetBrains Mono',monospace\"}}>{label}</label>}\n    <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}\n      style={{background:\"#080E1C\",border:\"1px solid #1E293B\",borderRadius:3,padding:\"8px 12px\",color:\"#E2E8F0\",fontSize:13,fontFamily:\"inherit\",outline:\"none\",resize:\"vertical\"}}/>\n  </div>\n);\nconst DropZone = ({onFile,file}) => {\n  const [drag,setDrag]=useState(false); const ref=useRef();\n  return <div onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)}\n    onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)onFile(f)}}\n    onClick={()=>ref.current.click()}\n    style={{border:`2px dashed ${drag?\"#F59E0B\":\"#1E3A5F\"}`,borderRadius:6,padding:\"22px 16px\",textAlign:\"center\",cursor:\"pointer\",background:drag?\"#0F1E3522\":\"transparent\",transition:\"all .2s\"}}>\n    <input ref={ref} type=\"file\" style={{display:\"none\"}} accept=\".pdf,.dwg,.dwf,.jpg,.png\" onChange={e=>{if(e.target.files[0])onFile(e.target.files[0])}}/>\n    {file?<div><div style={{fontSize:22,marginBottom:4}}>\ud83d\udcc4</div><div style={{color:\"#10B981\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:11}}>{file.name}</div><div style={{color:\"#475569\",fontSize:10,marginTop:2}}>{(file.size/1024).toFixed(1)} KB</div></div>\n    :<div><div style={{fontSize:22,opacity:.3,marginBottom:4}}>\u2b06</div><div style={{color:\"#475569\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:11}}>DROP DRAWING FILE</div><div style={{color:\"#334155\",fontSize:10,marginTop:2}}>PDF \u00b7 DWG \u00b7 DWF \u00b7 JPG \u00b7 PNG</div></div>}\n  </div>;\n};\nconst Modal = ({title,sub,onClose,children,wide,maxW}) => (\n  <div style={{position:\"fixed\",inset:0,background:\"#000000BB\",zIndex:200,display:\"flex\",alignItems:\"center\",justifyContent:\"center\",padding:16,overflowY:\"auto\"}}>\n    <div style={{position:\"relative\",background:\"#0D1526\",border:\"1px solid #1E293B\",borderRadius:7,width:\"100%\",maxWidth:maxW||(wide?720:560),maxHeight:\"92vh\",overflowY:\"auto\",padding:26}}>\n      {sub&&<div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#F59E0B\",letterSpacing:\".15em\",marginBottom:3}}>{sub}</div>}\n      <div style={{fontSize:18,fontWeight:700,color:\"#E2E8F0\",marginBottom:20}}>{title}</div>\n      {children}\n      <button onClick={onClose} style={{position:\"absolute\",top:16,right:16,background:\"none\",border:\"none\",color:\"#475569\",fontSize:16,cursor:\"pointer\"}}>\u2715</button>\n    </div>\n  </div>\n);\nconst Spinner = ({msg,color=\"#10B981\"}) => (\n  <div style={{display:\"flex\",alignItems:\"center\",gap:10}}>\n    <div style={{width:16,height:16,border:`2px solid ${color}`,borderTopColor:\"transparent\",borderRadius:\"50%\",animation:\"spin .8s linear infinite\",flexShrink:0}}/>\n    <span style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:11,color}}>{msg}</span>\n  </div>\n);\n\n// \u2500\u2500\u2500 SETUP MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst SetupModal = ({binSettings,boxSettings,onSave,onClose,onDownloadTeamVersion,connectBoxOAuth,isConnected,box}) => {\n  const [tab,setTab]=useState(\"sync\");\n  const [apiKey,setApiKey]=useState(binSettings.apiKey||\"\");\n  const [binId,setBinId]=useState(binSettings.binId||\"\");\n  const [clientId,setClientId]=useState(boxSettings.clientId||\"\");\n  const [clientSecret,setClientSecret]=useState(boxSettings.clientSecret||\"\");\n  const [redirectUri,setRedirectUri]=useState(boxSettings.redirectUri||\"https://greenmiki89.github.io/ShopDrawings/box-relay.html\");\n  const [step,setStep]=useState(\"idle\");\n  const [err,setErr]=useState(\"\");\n  const [logo,setLogo]=useState(window._submittalLogo||null);\n  const logoRef=useRef();\n\n  const handleLogo = (file) => {\n    if(!file) return;\n    const reader = new FileReader();\n    reader.onload = e => {\n      const dataUrl = e.target.result;\n      window._submittalLogo = dataUrl;\n      try { localStorage.setItem(\"submittal_logo\", dataUrl); } catch(e2) {}\n      setLogo(dataUrl);\n    };\n    reader.readAsDataURL(file);\n  };\n  const removeLogo = () => {\n    window._submittalLogo = null;\n    try { localStorage.removeItem(\"submittal_logo\"); } catch(e) {}\n    setLogo(null);\n  };\n\n  const createBin = async () => {\n    if(!apiKey.trim()) return alert(\"Paste your JSONBin API key first.\");\n    setStep(\"creating\"); setErr(\"\");\n    try {\n      const id = await JSONBin.create(apiKey.trim());\n      setBinId(id);\n      setStep(\"done\");\n    } catch(e) { setErr(e.message); setStep(\"error\"); }\n  };\n\n  const connectBin = async () => {\n    if(!apiKey.trim()||!binId.trim()) return alert(\"Enter both API key and Bin ID.\");\n    setStep(\"connecting\"); setErr(\"\");\n    try {\n      const b = new JSONBin(apiKey.trim(), binId.trim());\n      await b.load(); // verify it works\n      setStep(\"done\");\n    } catch(e) { setErr(e.message); setStep(\"error\"); }\n  };\n\n  const saveBin = () => {\n    if(!apiKey.trim()||!binId.trim()) return alert(\"Please connect to JSONBin first.\");\n    onSave({ apiKey:apiKey.trim(), binId:binId.trim(), boxCreds: boxSettings.token ? boxSettings : null });\n  };\n\n  const doBoxOAuth = async () => {\n    if(!clientId.trim()||!clientSecret.trim()) return alert(\"Enter Client ID and Client Secret.\");\n    setStep(\"connecting\"); setErr(\"\");\n    try {\n      const creds = await connectBoxOAuth(clientId.trim(), clientSecret.trim(), redirectUri.trim());\n      setStep(\"done\");\n      // Save Box creds into bin immediately\n      onSave({ apiKey:apiKey.trim()||binSettings.apiKey, binId:binId.trim()||binSettings.binId, boxCreds:creds });\n    } catch(e) { setErr(e.message); setStep(\"error\"); }\n  };\n\n  const T={background:\"transparent\",border:\"none\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:10,letterSpacing:\".1em\",padding:\"7px 14px\",cursor:\"pointer\",borderBottom:\"2px solid transparent\"};\n  const tabs = [[\"sync\",\"Data Sync\"],[\"box\",\"Box Uploads\"],[\"logo\",\"Company Logo\"],[\"share\",\"Team Sharing\"]];\n\n  return <Modal title=\"App Settings\" sub=\"SETUP\" onClose={onClose} wide maxW={580}>\n    <div style={{display:\"flex\",gap:0,marginBottom:18,borderBottom:\"1px solid #1E293B\"}}>\n      {tabs.map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{...T,color:tab===k?\"#3B82F6\":\"#475569\",borderBottomColor:tab===k?\"#3B82F6\":\"transparent\"}}>{l}</button>)}\n    </div>\n\n    {tab===\"sync\"&&<div>\n      <div style={{background:\"#061420\",border:\"1px solid #3B82F644\",borderRadius:5,padding:14,marginBottom:18,fontSize:12,color:\"#94A3B8\",lineHeight:1.9}}>\n        <strong style={{color:\"#3B82F6\"}}>JSONBin</strong> stores your shared submittal data (projects, statuses, revisions, release orders) so your whole team sees live updates.\n        <br/><br/>\n        1. Create a free account at <a href=\"https://jsonbin.io\" target=\"_blank\" rel=\"noopener\" style={{color:\"#3B82F6\"}}>jsonbin.io</a><br/>\n        2. Go to <strong style={{color:\"#E2E8F0\"}}>API Keys</strong> \u2192 copy your Master Key<br/>\n        3. Paste it below and click <strong style={{color:\"#10B981\"}}>Create New Bin</strong> (first time) or enter an existing Bin ID\n      </div>\n      <div style={{display:\"flex\",flexDirection:\"column\",gap:10,marginBottom:14}}>\n        <Field label=\"JSONBin Master Key\" value={apiKey} onChange={setApiKey} placeholder=\"$2a$10$...\" mono/>\n        <Field label=\"Bin ID (auto-filled after Create)\" value={binId} onChange={setBinId} placeholder=\"64abc123...\" mono hint=\"Share this ID with your team \u2014 everyone uses the same one\"/>\n      </div>\n      {err&&<div style={{color:\"#EF4444\",fontSize:11,marginBottom:10,fontFamily:\"monospace\"}}>{err}</div>}\n      <div style={{display:\"flex\",gap:8,justifyContent:\"flex-end\"}}>\n        <Btn variant=\"ghost\" onClick={onClose}>Cancel</Btn>\n        {step===\"creating\"||step===\"connecting\"\n          ? <Btn disabled variant=\"blue\">Working\u2026</Btn>\n          : <>\n              <Btn variant=\"outline\" onClick={connectBin}>Connect Existing Bin</Btn>\n              {!binId&&<Btn variant=\"green\" onClick={createBin}>+ Create New Bin</Btn>}\n              {binId&&<Btn variant=\"blue\" onClick={saveBin}>Save & Connect \u2192</Btn>}\n            </>\n        }\n      </div>\n    </div>}\n\n    {tab===\"box\"&&<div>\n      <div style={{background:\"#061420\",border:\"1px solid #3B82F644\",borderRadius:5,padding:14,marginBottom:18,fontSize:12,color:\"#94A3B8\",lineHeight:1.9}}>\n        <strong style={{color:\"#3B82F6\"}}>Box</strong> is used to upload drawing files (PDFs, DWGs) into organized folders. Connect once \u2014 the credentials are saved to your JSONBin so your whole team auto-connects.\n        <br/><br/>\n        1. Go to <a href=\"https://app.box.com/developers/console\" target=\"_blank\" rel=\"noopener\" style={{color:\"#3B82F6\"}}>app.box.com/developers/console</a> \u2192 Create New App \u2192 Custom App \u2192 OAuth 2.0<br/>\n        2. Add redirect URI: <code style={{color:\"#10B981\",fontSize:11}}>https://greenmiki89.github.io/ShopDrawings/box-relay.html</code><br/>\n        3. Copy Client ID and Client Secret below\n      </div>\n      <div style={{display:\"flex\",flexDirection:\"column\",gap:10,marginBottom:14}}>\n        <Field label=\"Client ID\" value={clientId} onChange={setClientId} placeholder=\"y7cyr30vz...\" mono/>\n        <Field label=\"Client Secret\" value={clientSecret} onChange={setClientSecret} placeholder=\"Your client secret\" mono/>\n        <Field label=\"Redirect URI\" value={redirectUri} onChange={setRedirectUri} mono/>\n      </div>\n      {err&&<div style={{color:\"#EF4444\",fontSize:11,marginBottom:10,fontFamily:\"monospace\"}}>{err}</div>}\n      {box&&<div style={{color:\"#10B981\",fontSize:11,marginBottom:10,fontFamily:\"monospace\"}}>\u2713 Box connected \u2014 credentials saved to JSONBin</div>}\n      <div style={{display:\"flex\",gap:8,justifyContent:\"flex-end\"}}>\n        <Btn variant=\"ghost\" onClick={onClose}>Cancel</Btn>\n        {step===\"connecting\"\n          ? <Btn disabled variant=\"blue\">Waiting for Box login\u2026</Btn>\n          : <Btn variant=\"blue\" onClick={doBoxOAuth}>{box?\"Re-authenticate Box \u2192\":\"Connect Box \u2192\"}</Btn>\n        }\n      </div>\n    </div>}\n\n    {tab===\"logo\"&&<div>\n      <div style={{background:\"#061420\",border:\"1px solid #3B82F644\",borderRadius:5,padding:14,marginBottom:18,fontSize:12,color:\"#94A3B8\",lineHeight:1.9}}>\n        Upload your company logo \u2014 it appears in the top-left corner of every cover letter and is saved locally in this browser.\n      </div>\n      {logo\n        ? <div style={{marginBottom:18}}>\n            <div style={{fontSize:11,color:\"#64748B\",marginBottom:8,fontFamily:\"'JetBrains Mono',monospace\",letterSpacing:\".08em\"}}>CURRENT LOGO</div>\n            <div style={{background:\"#fff\",padding:16,borderRadius:5,display:\"inline-block\",marginBottom:12}}>\n              <img src={logo} style={{maxHeight:72,maxWidth:200,objectFit:\"contain\"}} alt=\"logo\"/>\n            </div>\n            <div style={{display:\"flex\",gap:8}}>\n              <Btn small variant=\"outline\" onClick={()=>logoRef.current.click()}>Replace</Btn>\n              <Btn small variant=\"danger\" onClick={removeLogo}>Remove</Btn>\n            </div>\n          </div>\n        : <div onClick={()=>logoRef.current.click()} style={{border:\"2px dashed #1E3A5F\",borderRadius:5,padding:\"32px 24px\",textAlign:\"center\",cursor:\"pointer\",marginBottom:18}}\n            onMouseEnter={e=>e.currentTarget.style.borderColor=\"#3B82F6\"}\n            onMouseLeave={e=>e.currentTarget.style.borderColor=\"#1E3A5F\"}>\n            <div style={{fontSize:28,marginBottom:8,opacity:.4}}>\ud83c\udfe2</div>\n            <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:11,color:\"#475569\"}}>CLICK TO UPLOAD LOGO</div>\n            <div style={{fontSize:10,color:\"#334155\",marginTop:4}}>PNG \u00b7 JPG \u00b7 SVG \u00b7 recommended max 400\u00d7120px</div>\n          </div>\n      }\n      <input ref={logoRef} type=\"file\" accept=\"image/*\" style={{display:\"none\"}} onChange={e=>handleLogo(e.target.files[0])}/>\n      <div style={{display:\"flex\",justifyContent:\"flex-end\"}}>\n        <Btn variant=\"ghost\" onClick={onClose}>Close</Btn>\n      </div>\n    </div>}\n\n    {tab===\"share\"&&<div>\n      <div style={{background:\"#061420\",border:\"1px solid #3B82F644\",borderRadius:5,padding:14,marginBottom:18,fontSize:12,color:\"#94A3B8\",lineHeight:1.9}}>\n        Share your submittal manager with your team in two steps:\n        <br/><br/>\n        <strong style={{color:\"#E2E8F0\"}}>Option A \u2014 Share the URL:</strong> Just send them<br/>\n        <code style={{color:\"#10B981\",fontSize:11}}>https://greenmiki89.github.io/ShopDrawings/submittal-manager.html</code><br/>\n        They'll need to enter the JSONBin API key and Bin ID once.\n        <br/><br/>\n        <strong style={{color:\"#E2E8F0\"}}>Option B \u2014 Download pre-configured file:</strong> No setup for your team at all. They just open the file.\n      </div>\n      {isConnected\n        ? <>\n            <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:10,color:\"#10B981\",marginBottom:12}}>\u2713 Connected to Bin: {binSettings.binId||\"\u2014\"}</div>\n            <Btn variant=\"blue\" onClick={()=>{onClose();onDownloadTeamVersion();}}>\u2b07 Download Pre-Configured Team File</Btn>\n            <div style={{fontSize:11,color:\"#475569\",marginTop:8}}>The downloaded file has your JSONBin key and Bin ID baked in. Your team opens it and they're live \u2014 no setup needed.</div>\n          </>\n        : <div style={{color:\"#F59E0B\",fontSize:12}}>Connect to JSONBin first (Data Sync tab) to enable team sharing.</div>\n      }\n    </div>}\n  </Modal>;\n};\n\n// \u2500\u2500\u2500 BOX FOLDER PICKER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst BoxFolderPickerModal = ({box,onSelect,onClose,title,subtitle,allowRoot}) => {\n  const [stack,setStack]=useState([{id:\"0\",name:\"All Files\"}]);\n  const [items,setItems]=useState([]);\n  const [loading,setLoading]=useState(false);\n  const [err,setErr]=useState(\"\");\n  const [newName,setNewName]=useState(\"\");\n  const [creating,setCreating]=useState(false);\n  const cur = stack[stack.length-1];\n\n  const reload = () => {\n    setLoading(true); setErr(\"\");\n    box.getFolderItems(cur.id)\n      .then(r=>{ setItems((r.entries||[]).filter(e=>e.type===\"folder\")); setLoading(false); })\n      .catch(e=>{ setErr(e.message); setLoading(false); });\n  };\n\n  useEffect(()=>{ reload(); },[cur.id]);\n\n  const enter = f => setStack(s=>[...s,{id:f.id,name:f.name}]);\n  const back  = () => setStack(s=>s.length>1?s.slice(0,-1):s);\n\n  const createFolder = async () => {\n    if(!newName.trim()) return;\n    setCreating(true); setErr(\"\");\n    try {\n      const res = await box.createFolder(newName.trim(), cur.id);\n      setNewName(\"\");\n      setCreating(false);\n      reload();\n      // Auto-select the newly created folder\n      onSelect({id:res.id, name:res.name});\n    } catch(e) {\n      if(e.message.includes(\"409\")||e.message.includes(\"item_name_in_use\")) {\n        setErr(\"A folder with that name already exists here.\");\n      } else {\n        setErr(e.message);\n      }\n      setCreating(false);\n    }\n  };\n\n  return (\n  <Modal title={title||\"Select Box Project Folder\"} sub=\"BOX FOLDER PICKER\" onClose={onClose}>\n    {subtitle&&<div style={{fontSize:11,color:\"#64748B\",marginBottom:12,lineHeight:1.7}}>{subtitle}</div>}\n    {/* Breadcrumb */}\n    <div style={{display:\"flex\",alignItems:\"center\",gap:6,marginBottom:12,flexWrap:\"wrap\"}}>\n      {stack.map((s,i)=>(\n        <span key={i} style={{display:\"flex\",alignItems:\"center\",gap:6}}>\n          {i>0&&<span style={{color:\"#334155\",fontSize:10}}>\u203a</span>}\n          <button onClick={()=>setStack(stack.slice(0,i+1))} style={{background:\"none\",border:\"none\",color:i===stack.length-1?\"#F59E0B\":\"#64748B\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:10,cursor:\"pointer\",padding:\"2px 4px\"}}>{s.name}</button>\n        </span>\n      ))}\n    </div>\n    {/* Create new folder */}\n    <div style={{display:\"flex\",gap:8,marginBottom:12}}>\n      <input value={newName} onChange={e=>setNewName(e.target.value)}\n        onKeyDown={e=>e.key===\"Enter\"&&createFolder()}\n        placeholder=\"New folder name\u2026\"\n        style={{flex:1,background:\"#080E1C\",border:\"1px solid #1E3A5F\",borderRadius:3,padding:\"7px 10px\",color:\"#E2E8F0\",fontSize:12,fontFamily:\"'JetBrains Mono',monospace\",outline:\"none\"}}/>\n      <Btn small variant=\"green\" onClick={createFolder} disabled={!newName.trim()||creating}>\n        {creating?\"Creating\u2026\":\"+ Create & Select\"}\n      </Btn>\n    </div>\n    {err&&<div style={{color:\"#EF4444\",fontSize:11,marginBottom:8,fontFamily:\"monospace\"}}>{err}</div>}\n    <div style={{background:\"#0A0F1E\",border:\"1px solid #1E293B\",borderRadius:5,minHeight:200,maxHeight:280,overflowY:\"auto\",marginBottom:14}}>\n      {loading&&<div style={{padding:30,textAlign:\"center\"}}><Spinner msg=\"Loading folders\u2026\" color=\"#3B82F6\"/></div>}\n      {!loading&&!err&&items.length===0&&<div style={{padding:30,textAlign:\"center\",color:\"#334155\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:11}}>NO SUBFOLDERS \u2014 create one above</div>}\n      {!loading&&items.map(f=>(\n        <div key={f.id} style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",padding:\"10px 14px\",borderBottom:\"1px solid #0F1929\"}}\n          onMouseEnter={e=>e.currentTarget.style.background=\"#0F1E35\"}\n          onMouseLeave={e=>e.currentTarget.style.background=\"transparent\"}>\n          <div style={{display:\"flex\",alignItems:\"center\",gap:10,cursor:\"pointer\"}} onClick={()=>enter(f)}>\n            <span style={{fontSize:15}}>\ud83d\udcc1</span>\n            <span style={{color:\"#CBD5E1\",fontSize:13}}>{f.name}</span>\n          </div>\n          <div style={{display:\"flex\",gap:6}}>\n            <Btn small variant=\"ghost\" onClick={()=>enter(f)}>Open \u2192</Btn>\n            <Btn small variant=\"blue\" onClick={()=>onSelect({id:f.id,name:f.name})}>Select</Btn>\n          </div>\n        </div>\n      ))}\n    </div>\n    <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\"}}>\n      <Btn variant=\"ghost\" onClick={back} disabled={stack.length<=1}>\u2190 Back</Btn>\n      <div style={{display:\"flex\",gap:10}}>\n        <Btn variant=\"ghost\" onClick={onClose}>Cancel</Btn>\n        {allowRoot&&<Btn variant=\"blue\" onClick={()=>onSelect({id:cur.id,name:cur.name})}>Use \"{cur.name}\"</Btn>}\n      </div>\n    </div>\n  </Modal>\n  );\n};\n\n// \u2500\u2500\u2500 BOX UPLOAD PROGRESS PANEL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst BoxUploadPanel = ({step,folderUrl,error}) => (\n  <div style={{background:\"#061420\",border:`1px solid ${error?\"#EF444444\":folderUrl?\"#10B98144\":\"#1E3A5F\"}`,borderRadius:5,padding:\"12px 14px\",marginTop:12}}>\n    <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#3B82F6\",letterSpacing:\".14em\",marginBottom:8}}>BOX.COM UPLOAD</div>\n    {error&&<div style={{color:\"#EF4444\",fontSize:11,fontFamily:\"'JetBrains Mono',monospace\"}}>{error}</div>}\n    {!error&&!folderUrl&&<Spinner msg={step||\"Preparing\u2026\"} color=\"#3B82F6\"/>}\n    {folderUrl&&<div style={{display:\"flex\",alignItems:\"center\",gap:12}}>\n      <span style={{color:\"#10B981\",fontSize:18}}>\u2713</span>\n      <div>\n        <div style={{color:\"#10B981\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:11,marginBottom:3}}>Saved to Box!</div>\n        <a href={folderUrl} target=\"_blank\" rel=\"noopener\" style={{color:\"#3B82F6\",fontSize:11,fontFamily:\"'JetBrains Mono',monospace\",textDecoration:\"none\"}}>\ud83d\udd17 Open folder in Box \u2192</a>\n      </div>\n    </div>}\n  </div>\n);\n\n// \u2500\u2500\u2500 NEW SUBMITTAL MODAL (with Box upload) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst NewSubmittalModal = ({onClose,onSave,box,project}) => {\n  const [f,sf]=useState({title:\"\",specSection:\"\",drawingNumber:\"\",supplier:\"\",submittedBy:\"\",requiredDate:\"\",notes:\"\"});\n  const [file,setFile]=useState(null);\n  const [boxStep,setBoxStep]=useState(\"\");\n  const [boxUrl,setBoxUrl]=useState(\"\");\n  const [boxErr,setBoxErr]=useState(\"\");\n  const [saving,setSaving]=useState(false);\n  const set=(k,v)=>sf(p=>({...p,[k]:v}));\n  const hasBox = box && project.boxFolderId;\n\n  const save = async () => {\n    if(!f.title) return alert(\"Drawing title required.\");\n    setSaving(true);\n    const num=newSD();\n    const rev={rev:\"00\",dateSubmitted:today(),submittedBy:f.submittedBy,status:\"PENDING\",reviewerNotes:\"\",fileName:file?.name||\"\"};\n    const sub={...f,number:num,currentRev:\"00\",status:\"PENDING\",dateCreated:today(),fileName:file?.name||\"\",file,revisions:[rev],releaseOrders:[],boxFolderId:\"\",boxFolderUrl:\"\"};\n    // Save to app state first\n    let saved = {...sub};\n    if(hasBox) {\n      try {\n        setBoxStep(\"Starting\u2026\");\n        const result = await runBoxUpload(box, {...sub,file}, project, \"00\", setBoxStep, window._submittalLogo||null);\n        saved = {...saved, boxFolderId:result.folderId, boxFolderUrl:result.folderUrl};\n        setBoxUrl(result.folderUrl);\n      } catch(e) {\n        setBoxErr(e.message===\"BOX_UNAUTHORIZED\"?\"Box token expired. Re-connect Box in Settings.\":e.message);\n      }\n    }\n    onSave(saved);\n    if(!hasBox) onClose();\n    else setSaving(false);\n  };\n\n  return (\n  <Modal title=\"Add Shop Drawing Submittal\" sub=\"NEW SUBMITTAL\" onClose={!saving?onClose:()=>{}} wide>\n    <div style={{display:\"flex\",flexDirection:\"column\",gap:12}}>\n      <DropZone onFile={setFile} file={file}/>\n      <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:11}}>\n        <div style={{gridColumn:\"1/-1\"}}><Field label=\"Drawing / Submittal Title *\" value={f.title} onChange={v=>set(\"title\",v)} placeholder=\"e.g. Public Realm Luminaires \u2013 Typ. Types\"/></div>\n        <Field label=\"Spec Section\" value={f.specSection} onChange={v=>setF({...f,specSection:v})} placeholder=\"e.g. 05 12 00 Structural Steel Framing\"/>\n        <Field label=\"Drawing / Doc No.\" value={f.drawingNumber} onChange={v=>set(\"drawingNumber\",v)} placeholder=\"E-501\" mono/>\n        <Field label=\"Supplier / Vendor\" value={f.supplier} onChange={v=>set(\"supplier\",v)} placeholder=\"Who is providing this material?\"/>\n        <Field label=\"Submitted By\" value={f.submittedBy} onChange={v=>set(\"submittedBy\",v)} placeholder=\"Your name or PM\"/>\n        <Field label=\"Required Return Date\" value={f.requiredDate} onChange={v=>set(\"requiredDate\",v)} type=\"date\"/>\n      </div>\n      <TA label=\"Notes / Scope Description (one item per line for bulleted list)\" value={f.notes} onChange={v=>set(\"notes\",v)} placeholder={\"LX-1\\nLX-1A\\nLX-2\\nLX-3\"}/>\n      {hasBox&&<div style={{background:\"#061420\",border:\"1px solid #1E3A5F\",borderRadius:4,padding:\"8px 12px\",display:\"flex\",alignItems:\"center\",gap:8,fontSize:11,color:\"#64748B\"}}>\n        <span style={{color:\"#3B82F6\",fontSize:14}}>\u2601</span> Will auto-save to Box: <span style={{color:\"#94A3B8\",fontFamily:\"'JetBrains Mono',monospace\"}}>{project.boxFolderName}</span>\n      </div>}\n      {!hasBox&&box&&<div style={{background:\"#0A0F1E\",border:\"1px solid #F59E0B33\",borderRadius:4,padding:\"8px 12px\",fontSize:11,color:\"#F59E0B\"}}>\n        \u26a0 Link a Box folder to this project to enable auto-upload.\n      </div>}\n    </div>\n    {(boxStep||boxUrl||boxErr)&&<BoxUploadPanel step={boxStep} folderUrl={boxUrl} error={boxErr}/>}\n    <div style={{display:\"flex\",gap:10,justifyContent:\"flex-end\",marginTop:16}}>\n      {(boxUrl||boxErr)&&<Btn variant=\"ghost\" onClick={onClose}>Close</Btn>}\n      {!boxUrl&&!boxErr&&<><Btn variant=\"ghost\" onClick={onClose} disabled={saving}>Cancel</Btn>\n      <Btn onClick={save} disabled={saving}>{saving?\"Saving\u2026\":\"Add Submittal\"}</Btn></>}\n    </div>\n  </Modal>\n  );\n};\n\n// \u2500\u2500\u2500 REVIEW MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst ReviewModal = ({sub,onClose,onSave}) => {\n  const [status,setStatus]=useState(\"APPROVED\");\n  const [notes,setNotes]=useState(\"\");\n  const [dateReturned,setDateReturned]=useState(today());\n  const save=()=>{ const r=sub.revisions.map((r,i)=>i===sub.revisions.length-1?{...r,status,reviewerNotes:notes,dateReturned}:r); onSave({...sub,status,revisions:r}); };\n  return <Modal title=\"Record Review Outcome\" sub={`${sub.number} \u00b7 REV ${sub.currentRev}`} onClose={onClose}>\n    <div style={{display:\"flex\",flexDirection:\"column\",gap:12}}>\n      <Sel label=\"Review Outcome\" value={status} onChange={setStatus} options={Object.entries(STATUS).filter(([k])=>k!==\"RELEASED\").map(([k,v])=>({v:k,l:v.label}))}/>\n      <Field label=\"Date Returned by Consultant\" value={dateReturned} onChange={setDateReturned} type=\"date\"/>\n      <TA label=\"Reviewer / Consultant Notes\" value={notes} onChange={setNotes} placeholder=\"Record conditions, corrections, or comments from the consultant\u2026\" rows={4}/>\n    </div>\n    <div style={{display:\"flex\",gap:10,justifyContent:\"flex-end\",marginTop:16}}>\n      <Btn variant=\"ghost\" onClick={onClose}>Cancel</Btn>\n      <Btn variant=\"green\" onClick={save}>Save Outcome</Btn>\n    </div>\n  </Modal>;\n};\n\n// \u2500\u2500\u2500 RESUBMIT MODAL (with Box upload) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst ResubmitModal = ({sub,onClose,onSave,box,project}) => {\n  const nextRev=String(sub.revisions.length).padStart(2,\"0\");\n  const [f,sf]=useState({submittedBy:\"\",notes:\"\"});\n  const [file,setFile]=useState(null);\n  const [boxStep,setBoxStep]=useState(\"\");\n  const [boxUrl,setBoxUrl]=useState(\"\");\n  const [boxErr,setBoxErr]=useState(\"\");\n  const [saving,setSaving]=useState(false);\n  const hasBox = box && project.boxFolderId;\n  const last=sub.revisions[sub.revisions.length-1];\n\n  const save = async () => {\n    if(!f.submittedBy) return alert(\"Enter who is resubmitting.\");\n    setSaving(true);\n    const rev={rev:nextRev,dateSubmitted:today(),submittedBy:f.submittedBy,status:\"PENDING\",reviewerNotes:\"\",fileName:file?.name||\"\"};\n    const updated={...sub,currentRev:nextRev,status:\"PENDING\",fileName:file?.name||sub.fileName,file:file||sub.file,notes:f.notes||sub.notes,revisions:[...sub.revisions,rev]};\n    if(hasBox) {\n      try {\n        setBoxStep(\"Starting\u2026\");\n        await runBoxUpload(box, updated, project, nextRev, setBoxStep, window._submittalLogo||null);\n        setBoxUrl(box.getFolderLink(sub.boxFolderId||\"0\"));\n      } catch(e) {\n        setBoxErr(e.message===\"BOX_UNAUTHORIZED\"?\"Box token expired. Re-connect in Settings.\":e.message);\n      }\n    }\n    onSave(updated);\n    if(!hasBox) onClose();\n    else setSaving(false);\n  };\n\n  return <Modal title={`Resubmit \u2013 Rev ${nextRev}`} sub={`${sub.number} \u00b7 RESUBMISSION`} onClose={!saving?onClose:()=>{}}>\n    {last?.reviewerNotes&&<div style={{background:\"#0A0F1E\",border:\"1px solid #EF444433\",borderRadius:4,padding:12,marginBottom:14,fontFamily:\"'JetBrains Mono',monospace\",fontSize:11}}>\n      <div style={{color:\"#EF4444\",marginBottom:4,fontSize:9,letterSpacing:\".1em\"}}>PRIOR REVIEWER NOTES</div>\n      <div style={{color:\"#94A3B8\"}}>{last.reviewerNotes}</div>\n    </div>}\n    <div style={{display:\"flex\",flexDirection:\"column\",gap:11}}>\n      <DropZone onFile={setFile} file={file}/>\n      <Field label=\"Resubmitted By *\" value={f.submittedBy} onChange={v=>sf(p=>({...p,submittedBy:v}))} placeholder=\"Your name\"/>\n      <TA label=\"Resubmission Notes\" value={f.notes} onChange={v=>sf(p=>({...p,notes:v}))} placeholder=\"Describe what was changed\u2026\"/>\n    </div>\n    {(boxStep||boxUrl||boxErr)&&<BoxUploadPanel step={boxStep} folderUrl={boxUrl} error={boxErr}/>}\n    <div style={{display:\"flex\",gap:10,justifyContent:\"flex-end\",marginTop:16}}>\n      {(boxUrl||boxErr)&&<Btn variant=\"ghost\" onClick={onClose}>Close</Btn>}\n      {!boxUrl&&!boxErr&&<><Btn variant=\"ghost\" onClick={onClose} disabled={saving}>Cancel</Btn>\n      <Btn onClick={save} disabled={saving}>{saving?\"Uploading\u2026\":`Submit Rev ${nextRev}`}</Btn></>}\n    </div>\n  </Modal>;\n};\n\n// \u2500\u2500\u2500 REVISION HISTORY + PDF EXPORT MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst RevHistoryModal = ({sub,project,onClose,box}) => {\n  const [merging,setMerging]=useState(false);\n  const [mergeMsg,setMergeMsg]=useState(\"\");\n  const drawRef=useRef();\n\n  const exportPkg = async (drawFile) => {\n    setMerging(true); setMergeMsg(\"Loading PDF library\u2026\");\n    try {\n      if(!window.PDFLib){\n        await new Promise((res,rej)=>{ const s=document.createElement(\"script\"); s.src=\"https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js\"; s.onload=res; s.onerror=rej; document.head.appendChild(s); });\n      }\n      const {PDFDocument}=window.PDFLib;\n      setMergeMsg(\"Rendering cover letter\u2026\");\n      const coverBytes=await generateCoverPdf(coverSheetHTML(sub,project));\n      const merged=await PDFDocument.create();\n      const coverDoc=await PDFDocument.load(coverBytes);\n      const cp=await merged.copyPages(coverDoc,coverDoc.getPageIndices()); cp.forEach(p=>merged.addPage(p));\n      if(drawFile?.name?.toLowerCase().endsWith(\".pdf\")){\n        setMergeMsg(\"Merging drawing PDF\u2026\");\n        const db=await new Promise((r,e)=>{const fr=new FileReader();fr.onload=x=>r(x.target.result);fr.onerror=e;fr.readAsArrayBuffer(drawFile);});\n        const dd=await PDFDocument.load(db); const dp=await merged.copyPages(dd,dd.getPageIndices()); dp.forEach(p=>merged.addPage(p));\n      }\n      setMergeMsg(\"Saving\u2026\");\n      const bytes=await merged.save();\n      const a=document.createElement(\"a\"); a.href=URL.createObjectURL(new Blob([bytes],{type:\"application/pdf\"}));\n      a.download=`${sub.number}-Rev${sub.currentRev}-${safeName(sub.title)}.pdf`;\n      document.body.appendChild(a); a.click(); document.body.removeChild(a);\n      setMergeMsg(\"\u2713 Downloaded!\"); setTimeout(()=>{setMerging(false);setMergeMsg(\"\");},2500);\n    } catch(e){ setMergeMsg(\"Error: \"+e.message); setMerging(false); }\n  };\n  const hasPdf=sub.file&&sub.file.name?.toLowerCase().endsWith(\".pdf\");\n\n  return (\n  <Modal title=\"Revision History\" sub={`${sub.number} \u00b7 ${sub.title}`} onClose={onClose} wide>\n    <div style={{overflowX:\"auto\",marginBottom:16}}>\n      <table style={{width:\"100%\",borderCollapse:\"collapse\",minWidth:580}}>\n        <thead><tr style={{borderBottom:\"1px solid #1E293B\"}}>\n          {[\"Rev\",\"Submitted\",\"By\",\"File\",\"Returned\",\"Outcome\",\"Reviewer Notes\"].map(h=>(\n            <th key={h} style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#475569\",letterSpacing:\".1em\",textAlign:\"left\",padding:\"6px 10px\",textTransform:\"uppercase\"}}>{h}</th>\n          ))}\n        </tr></thead>\n        <tbody>{sub.revisions.map((r,i)=>(\n          <tr key={i} style={{borderBottom:\"1px solid #0F1929\",background:i%2?\"#0A0F1E\":\"transparent\"}}>\n            <td style={{padding:\"10px\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:12,color:\"#F59E0B\",fontWeight:700}}>{r.rev}</td>\n            <td style={{padding:\"10px\",fontSize:11,color:\"#94A3B8\"}}>{fmtDate(r.dateSubmitted)}</td>\n            <td style={{padding:\"10px\",fontSize:11,color:\"#CBD5E1\"}}>{r.submittedBy||\"\u2014\"}</td>\n            <td style={{padding:\"10px\",fontSize:10,color:\"#475569\",fontFamily:\"monospace\"}}>{r.fileName||\"\u2014\"}</td>\n            <td style={{padding:\"10px\",fontSize:11,color:\"#94A3B8\"}}>{fmtDate(r.dateReturned)}</td>\n            <td style={{padding:\"10px\"}}><Badge status={r.status}/></td>\n            <td style={{padding:\"10px\",fontSize:10,color:\"#64748B\",maxWidth:170}}>{r.reviewerNotes||\"\u2014\"}</td>\n          </tr>\n        ))}</tbody>\n      </table>\n    </div>\n\n    {sub.releaseOrders?.length>0&&<div style={{marginBottom:14}}>\n      <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#8B5CF6\",letterSpacing:\".12em\",marginBottom:8}}>RELEASE ORDERS</div>\n      {sub.releaseOrders.map((ro,i)=><div key={i} style={{background:\"#0A0F1E\",border:\"1px solid #8B5CF633\",borderRadius:4,padding:\"9px 13px\",marginBottom:5,display:\"flex\",gap:14,flexWrap:\"wrap\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:11}}>\n        <span style={{color:\"#8B5CF6\",fontWeight:700}}>{ro.number}</span>\n        <span style={{color:\"#94A3B8\"}}>{ro.supplierName}</span>\n        <span style={{color:\"#F59E0B\"}}>PO: {ro.poNumber}</span>\n        <span style={{color:\"#475569\"}}>{fmtDate(ro.date)}</span>\n      </div>)}\n    </div>}\n\n    {sub.boxFolderUrl&&<div style={{marginBottom:14,padding:\"10px 13px\",background:\"#061420\",border:\"1px solid #3B82F644\",borderRadius:4,display:\"flex\",alignItems:\"center\",gap:10}}>\n      <span style={{color:\"#3B82F6\",fontSize:16}}>\u2601</span>\n      <a href={sub.boxFolderUrl} target=\"_blank\" rel=\"noopener\" style={{color:\"#3B82F6\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:11,textDecoration:\"none\"}}>Open Box folder \u2192</a>\n    </div>}\n\n    <div style={{background:\"#0A0F1E\",border:\"1px solid #1E293B\",borderRadius:5,padding:\"13px 15px\",marginBottom:14}}>\n      <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#10B981\",letterSpacing:\".14em\",marginBottom:10}}>PDF PACKAGE EXPORT</div>\n      {merging\n        ? <Spinner msg={mergeMsg} color=\"#10B981\"/>\n        : <div style={{display:\"flex\",gap:8,flexWrap:\"wrap\",alignItems:\"center\"}}>\n            {mergeMsg&&<span style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:11,color:\"#10B981\",marginRight:6}}>{mergeMsg}</span>}\n            {hasPdf&&<Btn small variant=\"green\" onClick={()=>exportPkg(sub.file)} disabled={merging}>\u2b07 Export Cover + Drawing</Btn>}\n            <div><input ref={drawRef} type=\"file\" accept=\".pdf\" style={{display:\"none\"}} onChange={e=>{if(e.target.files[0])exportPkg(e.target.files[0])}}/>\n            <Btn small variant={hasPdf?\"ghost\":\"green\"} onClick={()=>drawRef.current.click()} disabled={merging}>{hasPdf?\"Use different PDF\u2026\":\"Attach PDF & Export\"}</Btn></div>\n            <Btn small variant=\"outline\" onClick={()=>openBlob(coverSheetHTML(sub,project))} disabled={merging}>\u2399 Cover Letter Only</Btn>\n          </div>\n      }\n    </div>\n    <div style={{display:\"flex\",justifyContent:\"flex-end\"}}><Btn variant=\"ghost\" onClick={onClose}>Close</Btn></div>\n    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>\n  </Modal>\n  );\n};\n\n// \u2500\u2500\u2500 RELEASE ORDER MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst ReleaseModal = ({sub,project,onClose,onIssue}) => {\n  const roNum=useRef(newRO(project.number)).current;\n  const [f,sf]=useState({supplierName:sub.supplier||\"\",supplierContact:\"\",poNumber:\"\",poDate:today(),quantity:\"\",deliveryDate:\"\",deliveryAddress:project.contractorAddress||\"\",conditions:\"\",approvalDate:today()});\n  const set=(k,v)=>sf(p=>({...p,[k]:v}));\n  const issue=()=>{\n    if(!f.supplierName)return alert(\"Supplier name required.\");\n    if(!f.poNumber)return alert(\"PO number required.\");\n    const ro={...f,number:roNum,date:today()};\n    onIssue(ro); openBlob(releaseOrderHTML(ro,sub,project));\n  };\n  return <Modal title=\"Issue Material Release Order\" sub=\"RELEASE ORDER\" onClose={onClose} wide>\n    <div style={{background:\"#0A0F1E\",border:\"1px solid #8B5CF644\",borderRadius:4,padding:12,marginBottom:14,display:\"flex\",justifyContent:\"space-between\",alignItems:\"center\",flexWrap:\"wrap\",gap:10}}>\n      <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:11}}>\n        <div style={{color:\"#475569\",marginBottom:3,fontSize:9,letterSpacing:\".1em\"}}>LINKED SUBMITTAL</div>\n        <div style={{color:\"#E2E8F0\"}}>{sub.number} \u2014 {sub.title}</div>\n        <div style={{color:\"#64748B\",marginTop:2}}>Rev {sub.currentRev} \u00b7 <span style={{color:STATUS[sub.status]?.color}}>{STATUS[sub.status]?.label}</span></div>\n      </div>\n      <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:18,color:\"#8B5CF6\",fontWeight:700}}>{roNum}</div>\n    </div>\n    <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:11}}>\n      <div style={{gridColumn:\"1/-1\"}}><div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#8B5CF6\",letterSpacing:\".13em\",marginBottom:8}}>SUPPLIER</div></div>\n      <Field label=\"Supplier / Vendor Name *\" value={f.supplierName} onChange={v=>set(\"supplierName\",v)} placeholder=\"ABC Systems Inc.\"/>\n      <Field label=\"Supplier Contact\" value={f.supplierContact} onChange={v=>set(\"supplierContact\",v)} placeholder=\"email or phone\"/>\n      <div style={{gridColumn:\"1/-1\",marginTop:4}}><div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#F59E0B\",letterSpacing:\".13em\",marginBottom:8}}>PURCHASE ORDER</div></div>\n      <Field label=\"PO Number *\" value={f.poNumber} onChange={v=>set(\"poNumber\",v)} placeholder=\"PO-2024-0847\" mono/>\n      <Field label=\"PO Date\" value={f.poDate} onChange={v=>set(\"poDate\",v)} type=\"date\"/>\n      <div style={{gridColumn:\"1/-1\",marginTop:4}}><div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#10B981\",letterSpacing:\".13em\",marginBottom:8}}>RELEASE DETAILS</div></div>\n      <Field label=\"Quantity / Scope\" value={f.quantity} onChange={v=>set(\"quantity\",v)} placeholder=\"Full scope per drawings\"/>\n      <Field label=\"Required Delivery Date\" value={f.deliveryDate} onChange={v=>set(\"deliveryDate\",v)} type=\"date\"/>\n      <div style={{gridColumn:\"1/-1\"}}><Field label=\"Delivery Address\" value={f.deliveryAddress} onChange={v=>set(\"deliveryAddress\",v)} placeholder=\"Site address\"/></div>\n      <Field label=\"Approval Date\" value={f.approvalDate} onChange={v=>set(\"approvalDate\",v)} type=\"date\"/>\n      <div style={{gridColumn:\"1/-1\"}}><TA label=\"Conditions / Special Notes\" value={f.conditions} onChange={v=>set(\"conditions\",v)} placeholder=\"Conditions, restrictions, special requirements\u2026\"/></div>\n    </div>\n    <div style={{display:\"flex\",gap:10,justifyContent:\"flex-end\",marginTop:16}}>\n      <Btn variant=\"ghost\" onClick={onClose}>Cancel</Btn>\n      <Btn variant=\"purple\" onClick={issue}>Issue &amp; Export PDF</Btn>\n    </div>\n  </Modal>;\n};\n\n// \u2500\u2500\u2500 NEW PROJECT MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst NewProjectModal = ({onClose,onSave}) => {\n  const [f,sf]=useState({name:\"\",number:\"\",owner:\"\",client:\"\",clientContact:\"\",consultant:\"\",phase:\"Construction\",contractorName:\"\",contractorAddress:\"\",contractorEmail:\"\",contractorPhone:\"\"});\n  const set=(k,v)=>sf(p=>({...p,[k]:v}));\n  return <Modal title=\"Create New Project\" sub=\"NEW PROJECT\" onClose={onClose} wide>\n    <div style={{display:\"grid\",gridTemplateColumns:\"1fr 1fr\",gap:11,marginBottom:16}}>\n      <div style={{gridColumn:\"1/-1\"}}><Field label=\"Project Name *\" value={f.name} onChange={v=>set(\"name\",v)} placeholder=\"Davenport Diamond Public Realm\"/></div>\n      <Field label=\"Project Number *\" value={f.number} onChange={v=>set(\"number\",v)} placeholder=\"2024-047\" mono/>\n      <Sel label=\"Phase\" value={f.phase} onChange={v=>set(\"phase\",v)} options={[\"Design Development\",\"Construction Documents\",\"Bidding\",\"Construction\",\"Close-Out\"]}/>\n      <Field label=\"Owner\" value={f.owner} onChange={v=>set(\"owner\",v)} placeholder=\"Owner / Developer\"/>\n      <Field label=\"Architect / Consultant Firm *\" value={f.client} onChange={v=>set(\"client\",v)} placeholder=\"Foster & Partners AIA\"/>\n      <Field label=\"Consultant Contact Name\" value={f.clientContact} onChange={v=>set(\"clientContact\",v)} placeholder=\"David Kim\"/>\n      <Field label=\"Engineer / Other Consultant\" value={f.consultant} onChange={v=>set(\"consultant\",v)} placeholder=\"Structural, MEP firm\u2026\"/>\n      <div style={{gridColumn:\"1/-1\",borderTop:\"1px solid #1E293B\",paddingTop:12}}>\n        <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#F59E0B\",letterSpacing:\".13em\",marginBottom:10}}>YOUR COMPANY (appears on cover letter)</div>\n      </div>\n      <Field label=\"Company Name\" value={f.contractorName} onChange={v=>set(\"contractorName\",v)} placeholder=\"Guild Electric Limited\"/>\n      <Field label=\"Company Address\" value={f.contractorAddress} onChange={v=>set(\"contractorAddress\",v)} placeholder=\"470 Midwest Road, Toronto ON M1P 4Y5\"/>\n      <Field label=\"Company Email\" value={f.contractorEmail} onChange={v=>set(\"contractorEmail\",v)} placeholder=\"yourname@company.com\"/>\n      <Field label=\"Company Phone\" value={f.contractorPhone} onChange={v=>set(\"contractorPhone\",v)} placeholder=\"(416) 288-8222\"/>\n    </div>\n    <div style={{display:\"flex\",gap:10,justifyContent:\"flex-end\"}}>\n      <Btn variant=\"ghost\" onClick={onClose}>Cancel</Btn>\n      <Btn onClick={()=>{if(!f.name||!f.number||!f.client)return alert(\"Name, number, and architect required.\"); onSave({...f,id:`p${Date.now()}`,boxFolderId:\"\",boxFolderName:\"\",submittals:[]});}}>Create Project</Btn>\n    </div>\n  </Modal>;\n};\n\n// \u2500\u2500\u2500 PROJECT VIEW \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst ProjectView = ({project,onBack,onUpdate,box,openBoxSetup}) => {\n  const [showNew,setShowNew]=useState(false);\n  const [reviewSub,setReviewSub]=useState(null);\n  const [resubSub,setResubSub]=useState(null);\n  const [histSub,setHistSub]=useState(null);\n  const [releaseSub,setReleaseSub]=useState(null);\n  const [showFolderPick,setShowFolderPick]=useState(false);\n  const [filter,setFilter]=useState(\"ALL\");\n  const [search,setSearch]=useState(\"\");\n\n  const up=u=>onUpdate({...project,submittals:project.submittals.map(s=>s.number===u.number?u:s)});\n  const add=s=>{onUpdate({...project,submittals:[...project.submittals,s]});setShowNew(false);};\n  const issueRO=ro=>{const u={...releaseSub,status:\"RELEASED\",releaseOrders:[...releaseSub.releaseOrders,ro]};up(u);setReleaseSub(null);};\n  const linkFolder=f=>{onUpdate({...project,boxFolderId:f.id,boxFolderName:f.name});setShowFolderPick(false);};\n\n  const subs=project.submittals;\n  const stats={total:subs.length,pending:subs.filter(s=>s.status===\"PENDING\").length,approved:subs.filter(s=>s.status===\"APPROVED\"||s.status===\"APPROVED_NC\").length,resubmit:subs.filter(s=>s.status===\"RESUBMIT\").length,released:subs.filter(s=>s.status===\"RELEASED\").length};\n  const filtered=subs.filter(s=>{const mf=filter===\"ALL\"||s.status===filter;const ms=!search||[s.title,s.number,s.specSection,s.supplier].join(\" \").toLowerCase().includes(search.toLowerCase());return mf&&ms;});\n\n  return <div style={{minHeight:\"100vh\",background:\"#070C18\"}}>\n    {/* Header */}\n    <div style={{background:\"#0A0F1E\",borderBottom:\"1px solid #1E293B\",padding:\"13px 22px\",display:\"flex\",alignItems:\"center\",gap:14,flexWrap:\"wrap\"}}>\n      <button onClick={onBack} style={{background:\"none\",border:\"1px solid #1E293B\",color:\"#64748B\",borderRadius:3,padding:\"5px 12px\",cursor:\"pointer\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:10,letterSpacing:\".06em\"}}>\u2190 PROJECTS</button>\n      <div style={{flex:1,minWidth:0}}>\n        <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#334155\",letterSpacing:\".1em\"}}>{project.number} \u00b7 SUBMIT TO: {project.client}</div>\n        <div style={{fontSize:16,fontWeight:700,color:\"#E2E8F0\",marginTop:2}}>{project.name}</div>\n      </div>\n      {/* Box folder indicator */}\n      <div style={{display:\"flex\",alignItems:\"center\",gap:8}}>\n        {project.boxFolderId\n          ? <div style={{display:\"flex\",alignItems:\"center\",gap:6,background:\"#061420\",border:\"1px solid #3B82F644\",borderRadius:3,padding:\"5px 10px\",fontSize:10,color:\"#3B82F6\",fontFamily:\"'JetBrains Mono',monospace\"}}>\n              <span>\u2601</span>\n              <a href={`https://app.box.com/folder/${project.boxFolderId}`} target=\"_blank\" rel=\"noopener\" style={{color:\"#3B82F6\",textDecoration:\"none\"}}>{project.boxFolderName||\"Box Folder\"}</a>\n              {box&&<button onClick={()=>setShowFolderPick(true)} style={{background:\"none\",border:\"none\",color:\"#475569\",cursor:\"pointer\",fontSize:9,letterSpacing:\".05em\",fontFamily:\"'JetBrains Mono',monospace\",padding:0,marginLeft:4}}>change</button>}\n            </div>\n          : box\n            ? <Btn small variant=\"outline\" style={{color:\"#3B82F6\",borderColor:\"#3B82F644\"}} onClick={()=>setShowFolderPick(true)}>\u2601 Link Box Folder</Btn>\n            : <Btn small variant=\"ghost\" onClick={openBoxSetup} style={{color:\"#3B82F6\",borderColor:\"#3B82F633\"}}>\u2601 Connect Box</Btn>\n        }\n      </div>\n      <button onClick={openBoxSetup} title=\"Settings\" style={{background:\"#0D1526\",border:\"1px solid #1E293B\",borderRadius:4,padding:\"7px 10px\",cursor:\"pointer\",color:\"#64748B\",fontSize:16,lineHeight:1}} onMouseEnter={e=>e.currentTarget.style.color=\"#E2E8F0\"} onMouseLeave={e=>e.currentTarget.style.color=\"#64748B\"}>\u2699</button>\n      <Btn onClick={()=>setShowNew(true)}>+ New Submittal</Btn>\n    </div>\n\n    <div style={{padding:\"16px 22px\",maxWidth:1150,margin:\"0 auto\"}}>\n      {/* Stats */}\n      <div style={{display:\"grid\",gridTemplateColumns:\"repeat(5,1fr)\",gap:8,marginBottom:18}}>\n        {[{l:\"Total\",v:stats.total,c:\"#94A3B8\"},{l:\"Pending\",v:stats.pending,c:\"#F59E0B\"},{l:\"Approved\",v:stats.approved,c:\"#10B981\"},{l:\"Resubmit\",v:stats.resubmit,c:\"#EF4444\"},{l:\"Released\",v:stats.released,c:\"#8B5CF6\"}].map(s=>(\n          <div key={s.l} style={{background:\"#0D1526\",border:\"1px solid #1E293B\",borderRadius:5,padding:\"12px 14px\",textAlign:\"center\"}}>\n            <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:22,fontWeight:700,color:s.c}}>{s.v}</div>\n            <div style={{fontSize:9,color:\"#334155\",letterSpacing:\".1em\",marginTop:2,textTransform:\"uppercase\"}}>{s.l}</div>\n          </div>\n        ))}\n      </div>\n      {/* Filter */}\n      <div style={{display:\"flex\",gap:8,marginBottom:12,flexWrap:\"wrap\",alignItems:\"center\"}}>\n        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder=\"Search title, spec, supplier\u2026\" style={{flex:1,minWidth:180,background:\"#0D1526\",border:\"1px solid #1E293B\",borderRadius:3,padding:\"6px 12px\",color:\"#E2E8F0\",fontSize:12,outline:\"none\"}}/>\n        {[\"ALL\",...Object.keys(STATUS)].map(k=>(\n          <button key={k} onClick={()=>setFilter(k)} style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,letterSpacing:\".07em\",padding:\"5px 11px\",borderRadius:3,border:`1px solid ${filter===k?\"#F59E0B44\":\"#1E293B\"}`,background:filter===k?\"#F59E0B1A\":\"transparent\",color:filter===k?\"#F59E0B\":\"#475569\",cursor:\"pointer\",transition:\"all .12s\"}}>\n            {k===\"ALL\"?\"ALL\":STATUS[k].label.split(\" \")[0].toUpperCase()}\n          </button>\n        ))}\n      </div>\n      {/* Submittals */}\n      {filtered.length===0\n        ? <div style={{textAlign:\"center\",padding:60,color:\"#1E293B\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:11}}>{subs.length===0?\"NO SUBMITTALS \u2014 ADD YOUR FIRST SHOP DRAWING\":\"NO MATCHES\"}</div>\n        : <div style={{display:\"flex\",flexDirection:\"column\",gap:7}}>\n            {filtered.map(sub=>{\n              const canRelease=sub.status===\"APPROVED\"||sub.status===\"APPROVED_NC\";\n              const canResubmit=sub.status===\"RESUBMIT\";\n              return <div key={sub.number} style={{background:\"#0D1526\",border:\"1px solid #1E293B\",borderRadius:5,padding:\"12px 16px\",display:\"grid\",gridTemplateColumns:\"88px 1fr auto auto\",gap:12,alignItems:\"center\"}}>\n                <div>\n                  <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:13,fontWeight:700,color:\"#F59E0B\"}}>{sub.number}</div>\n                  <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#334155\",marginTop:2}}>REV {sub.currentRev}</div>\n                  <div style={{fontSize:9,color:\"#1E3A5F\",marginTop:1,cursor:\"pointer\",textDecoration:\"underline\"}} onClick={()=>setHistSub(sub)}>{sub.revisions.length} rev{sub.revisions.length!==1?\"s\":\"\"}</div>\n                  {sub.boxFolderUrl&&<a href={sub.boxFolderUrl} target=\"_blank\" rel=\"noopener\" style={{fontSize:9,color:\"#3B82F6\",textDecoration:\"none\",display:\"block\",marginTop:2}}>\u2601 Box</a>}\n                </div>\n                <div>\n                  <div style={{color:\"#E2E8F0\",fontSize:14,fontWeight:600,marginBottom:3}}>{sub.title}</div>\n                  <div style={{display:\"flex\",gap:10,flexWrap:\"wrap\",alignItems:\"center\"}}>\n                    <span style={{fontSize:10,color:\"#475569\",fontFamily:\"'JetBrains Mono',monospace\"}}>{sub.specSection}</span>\n                    {sub.drawingNumber&&<span style={{fontSize:10,color:\"#334155\"}}>DWG: {sub.drawingNumber}</span>}\n                    {sub.supplier&&<span style={{fontSize:10,color:\"#64748B\"}}>\ud83c\udfed {sub.supplier}</span>}\n                    {sub.releaseOrders?.length>0&&<span style={{fontSize:10,color:\"#8B5CF6\"}}>\ud83d\udd17 {sub.releaseOrders.length} RO</span>}\n                  </div>\n                </div>\n                <div style={{display:\"flex\",flexDirection:\"column\",gap:5,alignItems:\"flex-end\"}}>\n                  <Badge status={sub.status}/>\n                  <Btn small variant=\"ghost\" onClick={()=>setReviewSub(sub)}>Record Review</Btn>\n                </div>\n                <div style={{display:\"flex\",flexDirection:\"column\",gap:5}}>\n                  <Btn small variant=\"outline\" onClick={()=>setHistSub(sub)}>History / PDF</Btn>\n                  {canResubmit&&<Btn small variant=\"ghost\" onClick={()=>setResubSub(sub)} style={{color:\"#EF4444\",borderColor:\"#EF444433\"}}>Resubmit</Btn>}\n                  {canRelease&&<Btn small variant=\"purple\" onClick={()=>setReleaseSub(sub)}>Issue RO</Btn>}\n                </div>\n              </div>;\n            })}\n          </div>\n      }\n    </div>\n\n    {showNew    &&<NewSubmittalModal onClose={()=>setShowNew(false)} onSave={add} box={box} project={project}/>}\n    {reviewSub  &&<ReviewModal sub={reviewSub} onClose={()=>setReviewSub(null)} onSave={s=>{up(s);setReviewSub(null);}}/>}\n    {resubSub   &&<ResubmitMod
