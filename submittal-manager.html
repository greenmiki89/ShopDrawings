al sub={resubSub} onClose={()=>setResubSub(null)} onSave={s=>{up(s);setResubSub(null);}} box={box} project={project}/>}\n    {histSub    &&<RevHistoryModal sub={histSub} project={project} onClose={()=>setHistSub(null)} box={box}/>}\n    {releaseSub &&<ReleaseModal sub={releaseSub} project={project} onClose={()=>setReleaseSub(null)} onIssue={issueRO}/>}\n    {showFolderPick&&box&&<BoxFolderPickerModal box={box} onSelect={linkFolder} onClose={()=>setShowFolderPick(false)}/>}\n  </div>;\n};\n\n// \u2500\u2500\u2500 DASHBOARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst Dashboard = ({projects,onSelect,onNewProject,onDelete,box,openBoxSetup,boxUser,workspace,onPickWorkspace}) => {\n  const all=projects.reduce((a,p)=>{a.total+=p.submittals.length;a.pending+=p.submittals.filter(s=>s.status===\"PENDING\").length;a.approved+=p.submittals.filter(s=>s.status===\"APPROVED\"||s.status===\"APPROVED_NC\").length;a.resubmit+=p.submittals.filter(s=>s.status===\"RESUBMIT\").length;return a;},{total:0,pending:0,approved:0,resubmit:0});\n  return <div style={{minHeight:\"100vh\",background:\"#070C18\",backgroundImage:\"radial-gradient(ellipse at 15% 60%,#0F1E3510 0%,transparent 55%)\"}}>\n    <div style={{background:\"#0A0F1E\",borderBottom:\"1px solid #1E293B\",padding:\"14px 26px\",display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\",gap:12,flexWrap:\"wrap\"}}>\n      <div style={{display:\"flex\",alignItems:\"center\",gap:12}}>\n        <div style={{width:34,height:34,background:\"#F59E0B\",borderRadius:4,display:\"flex\",alignItems:\"center\",justifyContent:\"center\",fontSize:14,fontWeight:700,color:\"#0A0F1E\",fontFamily:\"'JetBrains Mono',monospace\",letterSpacing:\".05em\"}}>SD</div>\n        <div>\n          <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:13,fontWeight:700,color:\"#E2E8F0\",letterSpacing:\".04em\"}}>SUBMITTAL MANAGER</div>\n          <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:8,color:\"#334155\",letterSpacing:\".18em\"}}>SHOP DRAWING CONTROL \u00b7 CONTRACTOR EDITION</div>\n        </div>\n      </div>\n      <div style={{display:\"flex\",alignItems:\"center\",gap:10}}>\n        {/* Box connection status */}\n        {box\n          ? <div style={{display:\"flex\",alignItems:\"center\",gap:6}}>\n              {workspace\n                ? <div style={{display:\"flex\",alignItems:\"center\",gap:8,background:\"#061420\",border:\"1px solid #3B82F644\",borderRadius:4,padding:\"6px 12px\",cursor:\"pointer\"}} onClick={onPickWorkspace}>\n                    <span style={{color:\"#3B82F6\",fontSize:14}}>\u2601</span>\n                    <div>\n                      <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#3B82F6\",letterSpacing:\".1em\"}}>TEAM WORKSPACE</div>\n                      <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#94A3B8\"}}>{workspace.name}</div>\n                    </div>\n                  </div>\n                : <Btn small variant=\"blue\" onClick={onPickWorkspace}>\u2601 Select Workspace Folder</Btn>\n              }\n              <div style={{background:\"#061420\",border:\"1px solid #1E293B\",borderRadius:4,padding:\"6px 10px\",cursor:\"pointer\"}} onClick={openBoxSetup}>\n                <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#475569\"}}>{boxUser?.name||\"Box User\"}</div>\n              </div>\n            </div>\n          : <Btn variant=\"outline\" style={{color:\"#3B82F6\",borderColor:\"#3B82F633\"}} onClick={openBoxSetup}>\u2601 Connect Box.com</Btn>\n        }\n        <button onClick={openBoxSetup} title=\"Settings\" style={{background:\"#0D1526\",border:\"1px solid #1E293B\",borderRadius:4,padding:\"7px 10px\",cursor:\"pointer\",color:\"#64748B\",fontSize:16,lineHeight:1,display:\"flex\",alignItems:\"center\",justifyContent:\"center\"}} onMouseEnter={e=>e.currentTarget.style.color=\"#E2E8F0\"} onMouseLeave={e=>e.currentTarget.style.color=\"#64748B\"}>\u2699</button>\n        <Btn onClick={onNewProject}>+ New Project</Btn>\n      </div>\n    </div>\n\n    <div style={{padding:\"24px\",maxWidth:1100,margin:\"0 auto\"}}>\n      <div style={{display:\"grid\",gridTemplateColumns:\"repeat(4,1fr)\",gap:12,marginBottom:28}}>\n        {[{l:\"Active Projects\",v:projects.length,c:\"#64748B\",i:\"\ud83c\udfd7\"},{l:\"Total Submittals\",v:all.total,c:\"#E2E8F0\",i:\"\ud83d\udccb\"},{l:\"Pending w/ Consultant\",v:all.pending,c:\"#F59E0B\",i:\"\u23f3\"},{l:\"Need Resubmittal\",v:all.resubmit,c:\"#EF4444\",i:\"\u21a9\"}].map(s=>(\n          <div key={s.l} style={{background:\"#0D1526\",border:\"1px solid #1E293B\",borderRadius:6,padding:\"16px 18px\"}}>\n            <div style={{display:\"flex\",justifyContent:\"space-between\",alignItems:\"flex-start\"}}>\n              <div><div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:26,fontWeight:700,color:s.c}}>{s.v}</div><div style={{fontSize:11,color:\"#475569\",marginTop:3}}>{s.l}</div></div>\n              <div style={{fontSize:20,opacity:.25}}>{s.i}</div>\n            </div>\n          </div>\n        ))}\n      </div>\n      <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#334155\",letterSpacing:\".15em\",marginBottom:12}}>PROJECTS ({projects.length})</div>\n      {projects.length===0\n        ? <div style={{textAlign:\"center\",padding:80,border:\"1px dashed #1E293B\",borderRadius:8}}><div style={{fontSize:40,opacity:.15,marginBottom:12}}>\ud83c\udfd7</div><div style={{fontFamily:\"'JetBrains Mono',monospace\",color:\"#1E293B\",fontSize:11}}>NO PROJECTS \u2014 CREATE YOUR FIRST PROJECT</div></div>\n        : <div style={{display:\"grid\",gridTemplateColumns:\"repeat(auto-fill,minmax(300px,1fr))\",gap:12}}>\n            {projects.map(p=>{\n              const ps={total:p.submittals.length,pending:p.submittals.filter(s=>s.status===\"PENDING\").length,approved:p.submittals.filter(s=>s.status===\"APPROVED\"||s.status===\"APPROVED_NC\").length,resubmit:p.submittals.filter(s=>s.status===\"RESUBMIT\").length};\n              const pct=ps.total?Math.round((ps.approved)/ps.total*100):0;\n              return <div key={p.id} onClick={()=>onSelect(p)}\n                onMouseEnter={e=>{e.currentTarget.style.borderColor=\"#F59E0B55\";e.currentTarget.style.transform=\"translateY(-2px)\";}}\n                onMouseLeave={e=>{e.currentTarget.style.borderColor=\"#1E293B\";e.currentTarget.style.transform=\"translateY(0)\";}}\n                style={{background:\"#0D1526\",border:\"1px solid #1E293B\",borderRadius:6,padding:18,cursor:\"pointer\",transition:\"all .17s\",position:\"relative\"}}>\n                <div style={{position:\"absolute\",top:10,right:10,display:\"flex\",alignItems:\"center\",gap:6}}>\n                  {p.boxFolderId&&<span style={{fontSize:12,color:\"#3B82F6\"}}>\u2601</span>}\n                  <button onClick={e=>{e.stopPropagation();if(window.confirm(`Delete \"${p.name}\"? This cannot be undone.`))onDelete(p.id);}}\n                    style={{background:\"none\",border:\"none\",color:\"#334155\",fontSize:13,cursor:\"pointer\",padding:\"2px 4px\",lineHeight:1,borderRadius:3}}\n                    onMouseEnter={e=>e.currentTarget.style.color=\"#EF4444\"}\n                    onMouseLeave={e=>e.currentTarget.style.color=\"#334155\"}\n                    title=\"Delete project\">\u2715</button>\n                </div>\n                <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,color:\"#F59E0B\",letterSpacing:\".1em\",marginBottom:4}}>{p.number}</div>\n                <div style={{fontSize:15,fontWeight:700,color:\"#E2E8F0\",marginBottom:3,paddingRight:60}}>{p.name}</div>\n                <div style={{fontSize:10,color:\"#475569\",marginBottom:2}}>\u2192 {p.client}</div>\n                <div style={{fontSize:10,color:\"#334155\",marginBottom:12}}>{p.contractorName}</div>\n                <div style={{height:2,background:\"#1E293B\",borderRadius:2,marginBottom:12}}>\n                  <div style={{height:\"100%\",width:`${pct}%`,background:pct===100?\"#10B981\":\"#F59E0B\",borderRadius:2,transition:\"width .3s\"}}/>\n                </div>\n                <div style={{display:\"flex\",gap:10}}>\n                  {[{v:ps.total,l:\"Total\",c:\"#64748B\"},{v:ps.pending,l:\"Pending\",c:\"#F59E0B\"},{v:ps.approved,l:\"Approved\",c:\"#10B981\"},{v:ps.resubmit,l:\"Resubmit\",c:\"#EF4444\"}].map(x=>(\n                    <div key={x.l} style={{flex:1,textAlign:\"center\"}}>\n                      <div style={{fontFamily:\"'JetBrains Mono',monospace\",fontSize:15,fontWeight:700,color:x.c}}>{x.v}</div>\n                      <div style={{fontSize:8,color:\"#334155\",letterSpacing:\".08em\",textTransform:\"uppercase\"}}>{x.l}</div>\n                    </div>\n                  ))}\n                </div>\n              </div>;\n            })}\n          </div>\n      }\n    </div>\n  </div>;\n};\n\n// \u2500\u2500\u2500 SYNC STATUS BAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst SyncBar = ({status,lastSync,onRefresh}) => {\n  if(!status) return null;\n  const colors = {syncing:\"#3B82F6\", saved:\"#10B981\", error:\"#EF4444\", loading:\"#F59E0B\"};\n  const icons  = {syncing:\"\u21bb\", saved:\"\u2713\", error:\"\u2715\", loading:\"\u2026\"};\n  const c = colors[status]||\"#64748B\";\n  return (\n    <div style={{position:\"fixed\",bottom:0,left:0,right:0,zIndex:500,background:\"#020812\",borderTop:\"1px solid #0F1929\",padding:\"5px 16px\",display:\"flex\",alignItems:\"center\",gap:10,fontFamily:\"'JetBrains Mono',monospace\",fontSize:10}}>\n      {status===\"syncing\"&&<div style={{width:10,height:10,border:`2px solid ${c}`,borderTopColor:\"transparent\",borderRadius:\"50%\",animation:\"spin .8s linear infinite\",flexShrink:0}}/>}\n      {status!==\"syncing\"&&<span style={{color:c,fontSize:12}}>{icons[status]}</span>}\n      <span style={{color:c,letterSpacing:\".08em\"}}>\n        {status===\"syncing\"&&\"Saving to Box\u2026\"}\n        {status===\"loading\"&&\"Loading shared data from Box\u2026\"}\n        {status===\"saved\"&&`Box sync \u2014 last saved ${lastSync||\"\"}`}\n        {status===\"error\"&&\"Box sync error \u2014 changes saved locally only\"}\n      </span>\n      {(status===\"saved\"||status===\"error\")&&<button onClick={onRefresh} style={{marginLeft:\"auto\",background:\"none\",border:\"1px solid #1E293B\",color:\"#475569\",borderRadius:3,padding:\"2px 10px\",cursor:\"pointer\",fontFamily:\"'JetBrains Mono',monospace\",fontSize:9,letterSpacing:\".06em\"}}>\u21bb REFRESH</button>}\n    </div>\n  );\n};\n\n// \u2500\u2500\u2500 ROOT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction App() {\n  const [projects,setProjects]=useState([]);\n  const [active,setActive]=useState(null);\n  const [showNewProj,setShowNewProj]=useState(false);\n  const [showSetup,setShowSetup]=useState(false);\n  // JSONBin (data sync)\n  const [bin,setBin]=useState(null);          // JSONBin instance\n  const [binSettings,setBinSettings]=useState({apiKey:\"\",binId:\"\"});\n  // Box (file uploads only)\n  const [box,setBox]=useState(null);          // BoxAPI instance\n  const [boxSettings,setBoxSettings]=useState({clientId:\"\",clientSecret:\"\",redirectUri:\"\",token:\"\"});\n  const [boxUser,setBoxUser]=useState(null);\n  // UI state\n  const [syncStatus,setSyncStatus]=useState(null);\n  const [lastSync,setLastSync]=useState(null);\n  const [workspace,setWorkspace]=useState(null);\n  const saveTimer=useRef(null);\n  const refreshTimer=useRef(null);\n\n  // \u2500\u2500 JSONBin: save data \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const saveData = useCallback(async (newProjects, binInst, boxCreds) => {\n    if(!binInst) return;\n    setSyncStatus(\"syncing\");\n    try {\n      const clean = BoxAPI.stripFiles(newProjects);\n      await binInst.save({ projects:clean, boxCreds: boxCreds||null, savedAt:new Date().toISOString() });\n      setLastSync(new Date().toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"}));\n      setSyncStatus(\"saved\");\n    } catch(e) { console.error(\"Save error:\",e); setSyncStatus(\"error\"); }\n  },[]);\n\n  const scheduleSync = useCallback((newProjects, binInst, boxCreds) => {\n    if(!binInst) return;\n    if(saveTimer.current) clearTimeout(saveTimer.current);\n    setSyncStatus(\"syncing\");\n    saveTimer.current = setTimeout(()=>saveData(newProjects, binInst, boxCreds), 1500);\n  },[saveData]);\n\n  // \u2500\u2500 JSONBin: load data \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const loadData = useCallback(async (binInst) => {\n    setSyncStatus(\"loading\");\n    try {\n      const record = await binInst.load();\n      if(record?.projects?.length) {\n        setProjects(record.projects);\n        setActive(a => a ? (record.projects.find(p=>p.id===a.id)||null) : null);\n      } else {\n        setProjects(SEED);\n      }\n      // If Box creds stored in bin, auto-connect Box silently\n      if(record?.boxCreds) {\n        connectBoxFromCreds(record.boxCreds);\n      }\n      setLastSync(new Date().toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"}));\n      setSyncStatus(\"saved\");\n    } catch(e) { console.error(\"Load error:\",e); setSyncStatus(\"error\"); if(projects.length===0) setProjects(SEED); }\n  // eslint-disable-next-line react-hooks/exhaustive-deps\n  },[]);\n\n  // \u2500\u2500 Box: connect silently using stored creds \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const connectBoxFromCreds = useCallback(async (creds) => {\n    if(!creds?.clientId||!creds?.clientSecret||!creds?.refreshToken) return;\n    try {\n      const tokens = await BoxAPI.refreshToken(creds.clientId, creds.clientSecret, creds.refreshToken);\n      const newCreds = {...creds, token:tokens.access_token, refreshToken:tokens.refresh_token};\n      setBoxSettings(newCreds);\n      setBox(new BoxAPI(tokens.access_token));\n      setBoxUser({name:\"Connected\"});\n      // Save updated refresh token back to bin\n      setBin(b => { if(b) saveData(null, b, newCreds); return b; });\n      // Schedule next refresh in 50 min\n      if(refreshTimer.current) clearInterval(refreshTimer.current);\n      refreshTimer.current = setInterval(()=>connectBoxFromCreds(newCreds), 50*60*1000);\n    } catch(e) { console.warn(\"Box auto-connect failed (will retry on next action):\",e.message); }\n  },[saveData]);\n\n  // \u2500\u2500 Box: OAuth connect (admin only, via popup) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const connectBoxOAuth = useCallback((clientId, clientSecret, redirectUri) => {\n    return new Promise((resolve, reject) => {\n      const state = btoa(JSON.stringify({clientId, clientSecret, redirectUri}));\n      const url = \"https://account.box.com/api/oauth2/authorize?response_type=code&client_id=\"+clientId+\"&redirect_uri=\"+encodeURIComponent(redirectUri)+\"&state=\"+encodeURIComponent(state);\n      const popup = window.open(url,\"BoxAuth\",\"width=600,height=700,left=200,top=100\");\n      const onMsg = async (e) => {\n        if(!e.data) return;\n        if(e.data.type===\"BOX_CODE\") {\n          window.removeEventListener(\"message\",onMsg);\n          try {\n            // Exchange code \u2192 tokens (works from HTTPS, not file://)\n            const res = await fetch(\"https://api.box.com/oauth2/token\", {\n              method:\"POST\", headers:{\"Content-Type\":\"application/x-www-form-urlencoded\"},\n              body: new URLSearchParams({ grant_type:\"authorization_code\", code:e.data.code, client_id:clientId, client_secret:clientSecret, redirect_uri:redirectUri })\n            });\n            if(!res.ok) { const t=await res.text(); throw new Error(t); }\n            const tokens = await res.json();\n            resolve({ clientId, clientSecret, redirectUri, token:tokens.access_token, refreshToken:tokens.refresh_token });\n          } catch(err) { reject(err); }\n        } else if(e.data.type===\"BOX_ERROR\") {\n          window.removeEventListener(\"message\",onMsg);\n          reject(new Error(e.data.error));\n        }\n      };\n      window.addEventListener(\"message\",onMsg);\n      setTimeout(()=>{ if(!popup||popup.closed) { window.removeEventListener(\"message\",onMsg); reject(new Error(\"Popup blocked\")); } },1200);\n    });\n  },[]);\n\n  // \u2500\u2500 Auto-refresh every 45s \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  useEffect(()=>{\n    if(!bin) return;\n    const iv = setInterval(()=>{ if(syncStatus!==\"syncing\") loadData(bin); }, 45000);\n    return ()=>clearInterval(iv);\n  },[bin,syncStatus,loadData]);\n\n  // \u2500\u2500 Auto-connect from BAKED_BIN or localStorage on startup \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  useEffect(()=>{\n    // Load saved logo\n    try {\n      const savedLogo = localStorage.getItem(\"submittal_logo\");\n      if(savedLogo) window._submittalLogo = savedLogo;\n    } catch(e) {}\n    // Connect to JSONBin\n    const source = BAKED_BIN || (() => {\n      try { const s=localStorage.getItem(\"submittal_bin\"); return s?JSON.parse(s):null; } catch(e){ return null; }\n    })();\n    if(!source) return;\n    const {apiKey,binId} = source;\n    if(!apiKey||!binId) return;\n    setBinSettings({apiKey,binId});\n    const b = new JSONBin(apiKey, binId);\n    setBin(b);\n    loadData(b);\n  // eslint-disable-next-line react-hooks/exhaustive-deps\n  },[]);\n\n  // \u2500\u2500 Setup: connect JSONBin + Box \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const handleSetupSave = useCallback(async ({apiKey, binId, boxCreds}) => {\n    setShowSetup(false);\n    setBinSettings({apiKey,binId});\n    // Persist to localStorage so refresh doesn't lose connection\n    try { localStorage.setItem(\"submittal_bin\", JSON.stringify({apiKey,binId})); } catch(e) {}\n    const b = new JSONBin(apiKey, binId);\n    setBin(b);\n    await loadData(b);\n    if(boxCreds) {\n      setBoxSettings(boxCreds);\n      setBox(new BoxAPI(boxCreds.token));\n      setBoxUser({name:\"Connected\"});\n    }\n  },[loadData]);\n\n  // \u2500\u2500 Mutate helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const updateProject = useCallback((p) => {\n    setProjects(ps=>{ const next=ps.map(x=>x.id===p.id?p:x); scheduleSync(next,bin,boxSettings); return next; });\n    setActive(p);\n  },[bin,boxSettings,scheduleSync]);\n\n  const addProject = useCallback((p) => {\n    setProjects(ps=>{ const next=[...ps,p]; scheduleSync(next,bin,boxSettings); return next; });\n    setShowNewProj(false);\n  },[bin,boxSettings,scheduleSync]);\n\n  const deleteProject = useCallback((id) => {\n    setProjects(ps=>{ const next=ps.filter(p=>p.id!==id); scheduleSync(next,bin,boxSettings); return next; });\n  },[bin,boxSettings,scheduleSync]);\n\n  // \u2500\u2500 Download Team Version \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const downloadTeamVersion = useCallback(()=>{\n    if(!binSettings.apiKey||!binSettings.binId) return alert(\"Connect to JSONBin first.\");\n    const baked = JSON.stringify({apiKey:binSettings.apiKey, binId:binSettings.binId});\n    const src = document.documentElement.outerHTML;\n    const replaced = src.replace(\n      /\\/\\/ __BAKED_BIN_START__[\\s\\S]*?\\/\\/ __BAKED_BIN_END__/,\n      \"// __BAKED_BIN_START__\\nconst BAKED_BIN = \"+baked+\";\\n// __BAKED_BIN_END__\"\n    );\n    const a = Object.assign(document.createElement(\"a\"),{href:URL.createObjectURL(new Blob([replaced],{type:\"text/html\"})),download:\"submittal-manager-TEAM.html\"});\n    document.body.appendChild(a); a.click(); document.body.removeChild(a);\n  },[binSettings]);\n\n  const proj = active ? projects.find(p=>p.id===active.id)||active : null;\n  const connected = !!bin;\n\n  return <>\n    <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Sora',sans-serif}select option{background:#0D1526;color:#E2E8F0}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0A0F1E}::-webkit-scrollbar-thumb{background:#1E293B;border-radius:3px}@keyframes spin{to{transform:rotate(360deg)}}`}</style>\n\n    {!connected&&<div style={{minHeight:\"100vh\",background:\"#070C18\",display:\"flex\",alignItems:\"center\",justifyContent:\"center\",padding:24}}>\n      <div style={{maxWidth:460,textAlign:\"center\"}}>\n        <div style={{width:50,height:50,background:\"#F59E0B\",borderRadius:8,display:\"flex\",alignItems:\"center\",justifyContent:\"center\",fontSize:20,fontWeight:700,color:\"#0A0F1E\",fontFamily:\"'JetBrains Mono',monospace\",margin:\"0 auto 20px\"}}>SD</div>\n        <div style={{fontSize:22,fontWeight:700,color:\"#E2E8F0\",marginBottom:8}}>Submittal Manager</div>\n        <div style={{fontSize:13,color:\"#475569\",marginBottom:28,lineHeight:1.9}}>\n          Sync your shop drawing submittals with your entire team.<br/>\n          Uses <strong style={{color:\"#E2E8F0\"}}>JSONBin</strong> for live data sync and <strong style={{color:\"#E2E8F0\"}}>Box</strong> for drawing uploads.\n        </div>\n        <Btn variant=\"blue\" onClick={()=>setShowSetup(true)} style={{fontSize:14,padding:\"12px 28px\"}}>Get Started \u2192</Btn>\n        <div style={{marginTop:16,fontSize:11,color:\"#334155\"}}>or <button onClick={()=>setProjects(SEED)} style={{background:\"none\",border:\"none\",color:\"#475569\",cursor:\"pointer\",fontSize:11,textDecoration:\"underline\"}}>use local demo data</button></div>\n      </div>\n    </div>}\n\n    {connected&&<>\n      {proj\n        ? <ProjectView project={proj} onBack={()=>setActive(null)} onUpdate={updateProject} box={box} openBoxSetup={()=>setShowSetup(true)}/>\n        : <Dashboard projects={projects} onSelect={setActive} onNewProject={()=>setShowNewProj(true)} onDelete={deleteProject} box={box} boxUser={boxUser} workspace={{name:\"JSONBin\"}} openBoxSetup={()=>setShowSetup(true)} onPickWorkspace={()=>setShowSetup(true)}/>\n      }\n      <SyncBar status={syncStatus} lastSync={lastSync} onRefresh={()=>bin&&loadData(bin)}/>\n    </>}\n\n    {showNewProj&&<NewProjectModal onClose={()=>setShowNewProj(false)} onSave={addProject}/>}\n    {showSetup&&<SetupModal\n      binSettings={binSettings} boxSettings={boxSettings}\n      onSave={handleSetupSave} onClose={()=>setShowSetup(false)}\n      onDownloadTeamVersion={downloadTeamVersion}\n      connectBoxOAuth={connectBoxOAuth}\n      isConnected={connected} box={box}\n    />}\n  </>;\n}\n";
    var preamble = "const { useState, useRef, useCallback, useEffect } = React;\n";
    var result = Babel.transform(preamble + jsxCode, {
      presets: [["react", {}], ["env", {targets:{browsers:"last 2 versions"}, modules:false}]],
      sourceType: "script"
    });
    var getApp = new Function("React", "ReactDOM", result.code + "\nreturn App;");
    var App = getApp(React, ReactDOM);
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  } catch(e) {
    document.getElementById("root").innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#070C18">' +
      '<div style="color:#EF4444;font-family:monospace;font-size:13px;max-width:640px;padding:24px;background:#0D1526;border:1px solid #EF444433;border-radius:6px;white-space:pre-wrap">' +
      '<div style="color:#F59E0B;margin-bottom:8px;font-size:10px;letter-spacing:.12em">LOAD ERROR</div>' +
      (e.message||String(e)) + '</div></div>';
    console.error("Submittal Manager:", e);
  }
});
</script>
