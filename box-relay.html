<!DOCTYPE html>
<html>
<head><title>Box Auth</title></head>
<body style="font-family:sans-serif;padding:40px;text-align:center;background:#f8f9fa">
<h2 id="msg" style="color:#1a1a2e">Connecting to Box…</h2>
<p id="sub" style="color:#6B7280;margin-top:12px;font-size:13px">You can close this window once connected.</p>
<script>
(function() {
  var query = new URLSearchParams(window.location.search);
  var code  = query.get('code');
  var error = query.get('error');
  var msg   = document.getElementById('msg');
  var sub   = document.getElementById('sub');

  if (error) {
    msg.textContent = 'Box error: ' + error;
    msg.style.color = '#EF4444';
    try { if(window.opener) window.opener.postMessage({type:'BOX_ERROR', error:error}, '*'); } catch(e){}
    return;
  }

  if (!code) {
    msg.textContent = 'No authorization code found.';
    msg.style.color = '#EF4444';
    sub.textContent = 'hash: ' + window.location.hash + ' | query: ' + window.location.search;
    return;
  }

  // Send the code back to the opener — token exchange happens in the app (HTTPS, no CORS issue)
  try {
    if (window.opener) {
      window.opener.postMessage({ type: 'BOX_CODE', code: code }, '*');
      msg.textContent = '\u2713 Connected! You can close this window.';
      msg.style.color = '#10B981';
      setTimeout(function(){ try{window.close();}catch(e){} }, 2000);
    } else {
      msg.textContent = 'Opener window not found.';
      msg.style.color = '#EF4444';
      sub.textContent = 'Please close this window and try again.';
    }
  } catch(e) {
    msg.textContent = 'Error: ' + e.message;
    msg.style.color = '#EF4444';
  }
})();
</script>
</body>
</html>
