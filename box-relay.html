<!DOCTYPE html>
<html>
<head><title>Box Auth</title></head>
<body style="font-family:sans-serif;padding:40px;text-align:center;background:#f8f9fa">
<h2 id="msg" style="color:#1a1a2e">Connecting to Box…</h2>
<p id="sub" style="color:#6B7280;margin-top:12px">You can close this window once connected.</p>
<script>
(function() {
  var isIframe = window.parent !== window;
  var hash = new URLSearchParams(window.location.hash.replace(/^#/,''));
  var query = new URLSearchParams(window.location.search);
  var token = hash.get('access_token');
  var msg = document.getElementById('msg');
  var sub = document.getElementById('sub');

  // ── IFRAME POLL MODE: read token from localStorage if stored ──────────
  if (isIframe) {
    msg.style.display='none'; sub.style.display='none';
    var stored = localStorage.getItem('box_token_pending');
    if (stored) {
      localStorage.removeItem('box_token_pending');
      window.parent.postMessage({ type: 'BOX_TOKEN', token: stored }, '*');
    }
    return;
  }

  // ── POPUP MODE: Box redirects here with #access_token= ───────────────
  if (!token) {
    msg.textContent = 'No token received.';
    msg.style.color = '#EF4444';
    return;
  }

  // Store in localStorage (for iframe polling fallback)
  try { localStorage.setItem('box_token_pending', token); } catch(e) {}

  // Try direct postMessage to opener
  try {
    if (window.opener) {
      window.opener.postMessage({ type: 'BOX_TOKEN', token: token }, '*');
    }
  } catch(e) {}

  msg.textContent = '✓ Connected! You can close this window.';
  msg.style.color = '#10B981';
  sub.textContent = 'Returning to the app…';
  setTimeout(function(){ try { window.close(); } catch(e) {} }, 2000);
})();
</script>
</body>
</html>
